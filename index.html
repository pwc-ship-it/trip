<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>출장 일정 관리</title>
<meta name="description" content="Vision 현장 출장 일정 & 인원 출장일 관리">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#18181e}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:#e8e8ec}
.app{position:fixed;inset:0;display:flex;flex-direction:column;background:#18181e}
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-bottom:1.5px solid #555;background:#20202e;flex-wrap:wrap;gap:5px}
.ttl{font-size:14px;font-weight:600;color:#e8e8ec;white-space:nowrap}
.tright{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.btn{padding:4px 11px;font-size:11px;border:1px solid #555;border-radius:5px;cursor:pointer;background:transparent;color:#e8e8ec;transition:background .15s}
.btn:hover{background:#252535}
.btn.pri{background:#1a6bbf;color:#fff;border-color:#155299}.btn.pri:hover{background:#155299}
.btn.ev{background:#534AB7;color:#fff;border-color:#3C3489}.btn.ev:hover{background:#3C3489}
.btn.gsh{background:#1a6b3a;color:#fff;border-color:#0f4a28}.btn.gsh:hover{background:#0f4a28}
.btn.sm{padding:2px 8px;font-size:11px}
.btn.red{background:#b52020;color:#fff;border-color:#7a1010}
.btn.warn{background:#7a5500;color:#fff;border-color:#5a3d00}
.btn.active{background:#534AB7;color:#fff;border-color:#3C3489}
/* 범례 */
.leg{display:flex;align-items:center;border:1px solid #3a3a44;border-radius:5px;overflow:hidden}
.legg{display:flex;align-items:center}
.legl{font-size:10px;color:#666;padding:0 6px;border-right:1px solid #3a3a44;white-space:nowrap;line-height:26px}
.legi{display:flex;align-items:center;gap:3px;padding:3px 7px;border-right:1px solid #3a3a44;font-size:10px;color:#b0b0b8}
.legi:last-child{border-right:none}
.legd{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.legs{width:1.5px;background:#555;align-self:stretch}
/* 레이아웃 */
.content{display:flex;flex:1;min-height:0;overflow:hidden}
.sidebar{width:185px;min-width:185px;flex-shrink:0;border-right:1.5px solid #555;background:#1e1e28;overflow-y:auto;display:flex;flex-direction:column}
.sbhead{padding:8px 10px 4px;border-bottom:1px solid #2a2a34}
.slbl{font-size:10px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.05em}
.sbody{padding:6px 8px;flex:1}
.grplbl{font-size:10px;font-weight:600;color:#888;padding:6px 4px 3px;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid #2a2a34;margin-bottom:2px}
.sit{display:flex;align-items:center;padding:3px 5px;border-radius:4px;cursor:pointer;border:1px solid transparent;margin-bottom:1px}
.sit:hover{background:#252535}.sit.on{background:#1e2a3a;border-color:#3a3a44}
.sit-all{display:flex;align-items:center;padding:4px 5px;border-radius:4px;cursor:pointer;border:1px solid transparent;margin-bottom:6px}
.sit-all:hover{background:#252535}.sit-all.on{background:#1e2a3a;border-color:#3a3a44}
.sdot{width:7px;height:7px;border-radius:50%;margin-right:5px;flex-shrink:0}
.sname{flex:1;font-size:11px;color:#c8c8d0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scnt{font-size:9px;padding:1px 4px;border-radius:5px;background:#252535;color:#888;border:1px solid #3a3a44;flex-shrink:0}
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
/* 간트 헤더 */
.gscroll{flex:1;overflow:auto}
.gwrap{display:inline-block;min-width:100%}
.ghrow{display:flex;flex-direction:column;position:sticky;top:0;z-index:30;border-bottom:2px solid #555;background:#1a1a28}
.ghinner{display:flex}
.ghfixed{width:300px;min-width:300px;flex-shrink:0;display:flex;border-right:2px solid #555;position:sticky;left:0;z-index:35;background:#1a1a28}
.ghc{flex:1;padding:4px 8px;font-size:11px;font-weight:500;color:#b0b0b8;border-right:1px solid #3a3a44}
.ghc:last-child{border-right:none}
.ghtl{display:flex;flex:1}
.ghmb{display:flex;flex-direction:column;border-right:1.5px solid #555;flex-shrink:0}
.ghmn{padding:3px 8px;font-size:11px;font-weight:500;color:#e8e8ec;border-bottom:1px solid #3a3a44;background:#1a1a28;white-space:nowrap}
.ghwks{display:flex}
.ghwk{font-size:10px;color:#666;padding:2px 0;border-right:1px solid #2a2a34;text-align:center;white-space:nowrap;flex-shrink:0;background:#20202e}
.ghdb{display:flex;height:17px;border-top:1px solid #3a3a44;background:#20202e}
.ghdbf{width:300px;min-width:300px;flex-shrink:0;border-right:2px solid #555;position:sticky;left:0;z-index:35;background:#20202e}
.ghdbt{flex:1;position:relative;height:17px}
.tdln{position:absolute;top:0;bottom:0;width:2px;background:#ff5555;opacity:.9;z-index:9;pointer-events:none}
.tdlb{position:absolute;top:1px;font-size:9px;font-weight:600;color:#ff5555;white-space:nowrap;z-index:10;padding:0 3px;border-radius:2px;background:#20202e;border:1px solid #ff5555}
/* 간트 행 */
.grprow{display:flex;align-items:stretch;border-top:2px solid #555;border-bottom:1px solid #3a3a44}
.grpfix{width:300px;min-width:300px;flex-shrink:0;padding:5px 10px;display:flex;align-items:center;gap:6px;border-right:2px solid #555;background:#222230;position:sticky;left:0;z-index:20}
.grpbadge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:7px;color:#fff;white-space:nowrap;flex-shrink:0}
.grpname{font-size:12px;font-weight:500;color:#e8e8ec}
.evrow{display:flex;align-items:stretch;border-bottom:1px solid #3a3a44}
.evfix{width:300px;min-width:300px;flex-shrink:0;border-right:2px solid #555;display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:500;color:#b0b0b8;position:sticky;left:0;z-index:20;background:#1e1e28}
.evtl{flex:1;position:relative;height:22px;background:#181820}
.grow{display:flex;align-items:stretch;border-bottom:1px solid #2a2a34}
.grow.even{background:#1c1c24}.grow.odd{background:#181820}
.grow:hover{background:#1e2a3a!important}.grow:hover .gfix{background:#1e2a3a!important}
.grow.hidden-row{opacity:.3}
.gfix{width:300px;min-width:300px;flex-shrink:0;display:flex;border-right:2px solid #555;align-items:center;position:sticky;left:0;z-index:20}
.grow.even .gfix{background:#1c1c24}.grow.odd .gfix{background:#181820}
.gtask{width:68px;min-width:68px;padding:0 7px;font-size:11px;color:#b0b0b8;border-right:1px solid #3a3a44;height:100%;display:flex;align-items:center}
.gperson{flex:1;padding:0 7px;font-size:11px;color:#e8e8ec;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:3px}
.gbadge{font-size:9px;padding:1px 5px;border-radius:4px;white-space:nowrap;flex-shrink:0;background:#1e1e26;color:#b0b0b8;border:1px solid #3a3a44}
.gtl{flex:1;position:relative;height:28px;min-height:28px}
.grow.done{opacity:.55}
.grow.done .gperson{text-decoration:line-through;color:#666}
.done-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:#3a3a3a;color:#888;border:1px solid #555;white-space:nowrap;flex-shrink:0}
.type-badge{font-size:9px;padding:1px 5px;border-radius:3px;color:#fff;white-space:nowrap;flex-shrink:0}
.hidden-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:#3a2a00;color:#aa8800;border:1px solid #5a4400;white-space:nowrap;flex-shrink:0}
/* 작업 행 */
.wkrow{display:flex;align-items:stretch;border-bottom:1px solid #2a2a34}
.wkfix{width:300px;min-width:300px;flex-shrink:0;border-right:2px solid #555;display:flex;align-items:center;padding:0 10px 0 14px;position:sticky;left:0;z-index:20;background:#1a1e2a}
.wkfix-label{font-size:10px;font-weight:500;color:#7aafee;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.wkfix-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:#1a3a5a;color:#7aafee;border:1px solid #2a5a8a;white-space:nowrap;flex-shrink:0}
.wktl{flex:1;position:relative;height:22px;background:#181c28}
/* 작업 바 */
.bar-wk-done{background:#2a3a5a}.bar-wk-going{background:#1a5a9a}.bar-wk-plan{background:#2a7acc}
.bar-wk{height:14px;top:4px;border-radius:3px;border-left:3px solid rgba(255,255,255,.25)}
/* 작업 섹션 헤더 */
.wksecrow{display:flex;align-items:stretch;border-bottom:1px solid #2a2a34;border-top:1px solid #2a3a4a}
.wksecfix{width:300px;min-width:300px;flex-shrink:0;border-right:2px solid #555;display:flex;align-items:center;padding:4px 10px;position:sticky;left:0;z-index:20;background:#151c2a}
.wksecfix-lbl{font-size:10px;font-weight:600;color:#5a8fcc;text-transform:uppercase;letter-spacing:.06em}
.wksectrl{flex:1;position:relative;height:18px;background:#151c28}
/* 모달 탭 */
.ev-type-sel{display:flex;gap:0;border:1px solid #3a3a44;border-radius:5px;overflow:hidden;margin-bottom:14px}
.ev-type-btn{flex:1;padding:5px 0;font-size:11px;font-weight:500;background:transparent;border:none;color:#888;cursor:pointer;transition:background .15s}
.ev-type-btn.on{background:#1a3a6a;color:#7aafee}
.ev-type-btn:hover:not(.on){background:#252535;color:#b0b0b8}
/* 그리드/바 */
.gl{position:absolute;top:0;bottom:0;width:1px;pointer-events:none;z-index:1;background:#2a2a34}
.gl.mo{background:#3a3a44;width:1.5px}
.tlnb{position:absolute;top:0;bottom:0;width:2px;background:#ff5555;opacity:.5;z-index:8;pointer-events:none}
.bar{position:absolute;height:18px;top:5px;border-radius:3px;display:flex;align-items:center;cursor:pointer;z-index:6;box-shadow:0 1px 3px rgba(0,0,0,.3);overflow:visible}
.bar:hover{opacity:.82}
.bar-hq-done{background:#4a4a6a}.bar-hq-going{background:#2176cc}.bar-hq-plan{background:#0f9e6e}
.bar-out-done{background:#5a4a2a}.bar-out-going{background:#cc8010}.bar-out-plan{background:#8a6e00}
.barlbl{position:sticky;left:302px;display:inline-flex;align-items:center;font-size:10px;font-weight:500;color:#fff;white-space:nowrap;height:100%;pointer-events:none;z-index:7;padding:0 7px;text-shadow:0 1px 2px rgba(0,0,0,.5)}
/* 이벤트 */
.evln{position:absolute;top:0;bottom:0;width:2px;z-index:7;pointer-events:none}
.evchip{position:absolute;top:3px;font-size:9px;font-weight:500;padding:1px 5px;border-radius:3px;white-space:nowrap;cursor:pointer;z-index:9;color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3);overflow:hidden;text-overflow:ellipsis}
.empty{padding:40px;text-align:center;color:#666;font-size:13px}
/* 모달 */
.mover{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.65);backdrop-filter:blur(3px)}
.modal{background:#181820;border-radius:10px;border:1.5px solid #555;padding:20px 22px;width:460px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.5)}
.modal.wide{width:700px}
.mtit{font-size:14px;font-weight:500;margin-bottom:16px;color:#e8e8ec}
.fg{margin-bottom:12px}
.fl{font-size:11px;color:#b0b0b8;margin-bottom:4px;display:block;font-weight:500}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input[type=text],input[type=date],select{width:100%;padding:6px 9px;border:1px solid #3a3a44;border-radius:5px;font-size:12px;outline:none;background:#1e1e26;color:#e8e8ec}
input[type=text]:focus,input[type=date]:focus,select:focus{border-color:#1a6bbf}
.chkrow{display:flex;align-items:center;gap:7px;font-size:12px;color:#e8e8ec;padding:4px 0;cursor:pointer}
.chkrow input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:#534AB7}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid #3a3a44}
.dbox{padding:6px 10px;background:#1e1e26;border-radius:5px;font-size:12px;color:#b0b0b8;margin-bottom:12px;border:1px solid #3a3a44}
.crow{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.csw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s}
.csw.sel{border-color:#e8e8ec;transform:scale(1.2)}
/* 사이트 관리 모달 */
.sitemgr{display:grid;grid-template-columns:1fr 1fr;gap:0;height:500px;max-height:70vh}
.sitemgr-l{border-right:1px solid #3a3a44;padding-right:14px;overflow-y:auto;display:flex;flex-direction:column}
.sitemgr-r{padding-left:14px;overflow-y:auto}
.smtit{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #2a2a34}
.mrow{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid #1e1e26}
.mrow:last-child{border-bottom:none}
.dh{cursor:grab;color:#555;font-size:13px;padding:0 2px;user-select:none;flex-shrink:0}
.dover{border-top:2px solid #1a6bbf!important}
.grp-chip{font-size:9px;padding:1px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0}
/* 연결 상태 */
.conn-dot{display:inline-flex;align-items:center;gap:5px;font-size:11px;color:#888;cursor:pointer;padding:3px 8px;border-radius:5px;border:1px solid #333;background:#1a1a28;transition:background .15s}
.conn-dot:hover{background:#252535}
.conn-led{width:8px;height:8px;border-radius:50%;background:#555;flex-shrink:0;transition:background .3s}
.conn-led.ok{background:#0f9e6e;box-shadow:0 0 5px #0f9e6e}
.conn-led.err{background:#b52020;box-shadow:0 0 5px #b52020}
.conn-led.chk{background:#cc8010;box-shadow:0 0 5px #cc8010}
/* 날짜 선택기 */
.date-wrap{position:relative;width:100%;display:block}
.date-wrap input[type=date]{position:absolute;opacity:0;width:100%;height:100%;top:0;left:0;cursor:pointer;z-index:2}
.date-disp{width:100%;padding:6px 9px;border:1px solid #3a3a44;border-radius:5px;font-size:12px;background:#1e1e26;color:#e8e8ec;cursor:pointer;display:flex;align-items:center;gap:6px;position:relative;z-index:1}
.date-disp:hover{border-color:#1a6bbf}
.date-disp .cal-icon{color:#666;font-size:11px}

/* ── 탭 네비게이션 ── */
.tab-nav{display:flex;align-items:center;gap:2px;flex-shrink:0}
.tab-btn{padding:4px 14px;font-size:12px;font-weight:500;border:1px solid #3a3a44;border-radius:5px 5px 0 0;cursor:pointer;background:#20202e;color:#888;transition:all .15s;border-bottom:none;position:relative;top:1px}
.tab-btn:hover{color:#ccc;background:#252535}
.tab-btn.on{background:#18181e;color:#e8e8ec;border-color:#555;border-bottom:1px solid #18181e;z-index:2}
.tab-bar{flex-shrink:0;display:flex;align-items:flex-end;padding:0 14px;background:#20202e;border-bottom:1.5px solid #555;height:30px}

/* ── 인원 출장 일수 탭 ── */
.pm-wrap{flex:1;overflow:auto;padding:14px 18px;background:#18181e}
.pm-section{margin-bottom:22px}
.pm-sec-head{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:7px;border-bottom:1.5px solid #3a3a44}
.pm-sec-icon{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.pm-sec-title{font-size:13px;font-weight:600;color:#e8e8ec}
.pm-sec-sub{font-size:11px;color:#666}
.pm-sec-badge{font-size:10px;padding:2px 8px;border-radius:8px;color:#fff;font-weight:500}
.pm-table{width:100%;border-collapse:collapse;font-size:12px}
.pm-table th{padding:7px 10px;text-align:left;font-size:10px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.05em;background:#1a1a26;border-bottom:1px solid #3a3a44;white-space:nowrap}
.pm-table td{padding:8px 10px;border-bottom:1px solid #232330;vertical-align:top}
.pm-table tr:hover td{background:#1e2438}
.pm-table tr:last-child td{border-bottom:none}
.pm-name{font-size:13px;font-weight:500;color:#e8e8ec}
.pm-type{font-size:9px;padding:1px 5px;border-radius:3px;color:#fff;margin-left:5px;vertical-align:middle}
.pm-days-big{font-size:18px;font-weight:700;color:#e8e8ec;line-height:1}
.pm-days-unit{font-size:11px;color:#888;margin-left:2px}
.pm-days-warn{color:#e8a020}
.pm-days-alert{color:#e84040}
.pm-trips{display:flex;flex-direction:column;gap:3px}
.pm-trip-row{display:flex;align-items:center;gap:6px;font-size:11px;padding:2px 6px;border-radius:3px;background:#1e1e2a}
.pm-trip-site{font-size:10px;padding:1px 6px;border-radius:3px;color:#fff;white-space:nowrap;flex-shrink:0}
.pm-trip-period{color:#888;white-space:nowrap;flex-shrink:0}
.pm-trip-days{color:#aaa;white-space:nowrap;flex-shrink:0}
.pm-trip-status{font-size:9px;padding:1px 5px;border-radius:3px;white-space:nowrap;flex-shrink:0}
.pm-kr-days{font-size:12px;font-weight:500;color:#0f9e6e}
.pm-kr-neg{color:#e84040}
.pm-bar-wrap{width:100%;background:#1e1e2a;border-radius:3px;height:6px;margin-top:3px;overflow:hidden}
.pm-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.pm-empty{color:#555;font-size:12px;font-style:italic;padding:12px 10px}
.pm-rolling-badge{font-size:9px;padding:1px 6px;border-radius:3px;background:#1a3a1a;color:#4aaa4a;border:1px solid #2a5a2a;white-space:nowrap;flex-shrink:0}
.pm-filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.pm-filter-btn{padding:3px 10px;font-size:11px;border:1px solid #3a3a44;border-radius:4px;cursor:pointer;background:transparent;color:#888;transition:all .15s}
.pm-filter-btn:hover{color:#ccc;background:#252535}
.pm-filter-btn.on{background:#1a3a5a;color:#7aafee;border-color:#2a5a8a}
.pm-stats-row{display:flex;gap:14px;margin-bottom:16px;flex-wrap:wrap}
.pm-stat-card{flex:1;min-width:140px;background:#1a1a26;border:1px solid #2a2a3a;border-radius:7px;padding:10px 14px}
.pm-stat-val{font-size:22px;font-weight:700;color:#e8e8ec;line-height:1}
.pm-stat-lbl{font-size:10px;color:#666;margin-top:3px}
.pm-stat-sub{font-size:11px;color:#888;margin-top:1px}
/* 진행중 뱃지 */
.status-going{background:#1a4a2a;color:#4aaa70;border:1px solid #2a6a3a}
.status-plan{background:#1a2a4a;color:#4a8aee;border:1px solid #2a4a7a}
.status-done{background:#2a2a3a;color:#888;border:1px solid #3a3a4a}
/* B1 비자 경고 */
.b1-ok{color:#4aaa70}
.b1-warn{color:#e8a020}
.b1-alert{color:#e84040;font-weight:600}
.pm-b1-note{font-size:10px;color:#666;padding:4px 0;margin-top:4px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px">
      <span class="ttl">출장 일정 관리</span>
      <div class="conn-dot" id="connStatus" onclick="checkConn()" title="클릭하면 연결 상태 확인">
        <div class="conn-led" id="connLed"></div>
        <span id="connTxt">연결 확인</span>
      </div>
    </div>
    <div class="tright" id="topbarRight">
      <!-- 간트 탭 전용 버튼 -->
      <div id="ganttTools" style="display:flex;gap:5px;align-items:center;flex-wrap:wrap">
        <div class="leg">
          <div class="legg">
            <span class="legl">본사계열</span>
            <div class="legi"><div class="legd" style="background:#4a4a6a"></div>완료</div>
            <div class="legi"><div class="legd" style="background:#2176cc"></div>출장중</div>

var S={filterSite:'all',showHidden:false,groups:[],sites:[],projects:[],schedules:[],events:[],workTasks:[]};

function deepCopy(o){return JSON.parse(JSON.stringify(o));}
function normDate(s){
  // 어떤 형식이든 YYYY-MM-DD로 정규화
  if(!s)return '';
  // 이미 YYYY-MM-DD 형식이면 그대로
  if(/^\d{4}-\d{2}-\d{2}$/.test(String(s).trim()))return String(s).trim();
  // Date 객체 문자열 등 다른 형식은 파싱 후 변환
  var d=new Date(s);
  if(isNaN(d.getTime()))return s;
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function loadData(){
  // localStorage 캐시 있으면 우선 사용, 없으면 DEF
  try{
    var cached=localStorage.getItem(CACHE_KEY);
    if(cached){
      var d=JSON.parse(cached);
      if(d&&Array.isArray(d.sites)&&d.sites.length){
        S.groups=d.groups||[];S.sites=d.sites;S.projects=d.projects;
        S.schedules=(d.schedules||[]).map(function(sc){
          sc.start=normDate(sc.start);sc.end=normDate(sc.end);
          if(typeof sc.hidden==='string'){
            sc.hidden=sc.hidden.toUpperCase()==='TRUE'||sc.hidden==='1'||sc.hidden==='true';
          }
          return sc;
        });
        S.events=d.events||[];
        S.workTasks=d.workTasks||[];
        return;
      }
    }
  }catch(e){}
  // 캐시 없으면 DEF 기본 데이터
  var def=deepCopy(DEF);
  S.groups=def.groups||[];S.sites=def.sites;S.projects=def.projects;
  S.schedules=def.schedules;S.events=def.events;S.workTasks=def.workTasks||[];
}
function saveCache(data){
  try{
    localStorage.setItem(CACHE_KEY, JSON.stringify(data));
    localStorage.setItem(CACHE_TS_KEY, Date.now().toString());
  }catch(e){}
}
function saveData(){
  // 1. 즉시 localStorage 캐시 업데이트 (새로고침 시 최신 상태 보장)
  saveCache({groups:S.groups,sites:S.sites,projects:S.projects,schedules:S.schedules,events:S.events,workTasks:S.workTasks});
  // 2. 비동기로 Sheets에 저장
  var url=getSheetsUrl();
  if(!url||location.protocol==='file:')return;
  fetch(url,{method:'POST',headers:{'Content-Type':'text/plain'},
    body:JSON.stringify({action:'save',groups:S.groups,sites:S.sites,
      projects:S.projects,schedules:S.schedules,events:S.events,workTasks:S.workTasks})
  }).then(function(r){return r.json();})
  .then(function(data){
    if(data.error)console.warn('자동저장 실패:',data.error);
    else updateConnStatus('ok');
  })
  .catch(function(err){
    console.warn('자동저장 실패:',err.message);
    updateConnStatus('err');
  });
}
function updateConnStatus(state){
  var led=document.getElementById('connLed');
  var txt=document.getElementById('connTxt');
  if(!led)return;
  if(state==='ok'){led.className='conn-led ok';txt.textContent='연결 정상';}
  else if(state==='err'){led.className='conn-led err';txt.textContent='저장 실패';}
}

function showInd(msg){var d=document.createElement('div');d.style.cssText='position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#1e1e26;color:#e8e8ec;padding:20px 32px;border-radius:10px;border:1px solid #555;z-index:999;font-size:13px';d.textContent=msg;document.body.appendChild(d);return d;}
function hideInd(d){if(d&&d.parentNode)d.parentNode.removeChild(d);}
function sheetsLoad(){
  // 수동 새로고침용 (연결 확인 버튼에서 사용)
  loadFromSheets(function(){renderAll();});
}
function loadFromSheets(callback){
  var url=getSheetsUrl();
  if(!url||location.protocol==='file:'){
    if(callback)callback();return;
  }
  var led=document.getElementById('connLed');
  var txt=document.getElementById('connTxt');
  if(led){led.className='conn-led chk';txt.textContent='동기화 중...';}
  fetch(url+'?action=load')
    .then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();})
    .then(function(data){
      if(data.error)throw new Error(data.error);
      if(data.groups&&data.groups.length)S.groups=data.groups;
      if(data.sites&&data.sites.length){
        var oldSites=S.sites;
        S.sites=data.sites.map(function(ns){
          var old=oldSites.find(function(os){return os.id===ns.id;});
          if(!ns.groupId&&old&&old.groupId)ns.groupId=old.groupId;
          return ns;
        });
      }
      if(data.projects&&data.projects.length)S.projects=data.projects;
      if(data.schedules&&data.schedules.length){
        S.schedules=data.schedules.map(function(sc){
          sc.start=normDate(sc.start);sc.end=normDate(sc.end);
          // Sheets에서 hidden이 "TRUE"/"FALSE" 문자열로 오는 경우 변환
          if(typeof sc.hidden === 'string'){
            sc.hidden = sc.hidden.toUpperCase()==='TRUE'||sc.hidden==='1'||sc.hidden==='true';
          }
          return sc;
        });
      }
      if(data.events)S.events=data.events;
      if(data.workTasks)S.workTasks=data.workTasks.map(function(wt){wt.start=normDate(wt.start);wt.end=normDate(wt.end);return wt;});
      // 성공적으로 로드된 데이터를 캐시에 저장

/* ── 날짜 유틸 ── */
var TODAY=(function(){var d=new Date();d.setHours(0,0,0,0);return d;})();
function pd(s){var d=new Date(s);d.setHours(0,0,0,0);return d;}

function dd(a,b){return Math.round((pd(b)-pd(a))/86400000)+1;}
function fmt(s){var d=pd(s);return String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');}
function fmtFull(s){if(!s)return '';var d=pd(s);return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');}
function todayLbl(){return (TODAY.getMonth()+1)+'/'+TODAY.getDate();}
function barCls(sc){
  var s=pd(sc.start),e=pd(sc.end);
  var isHq=(sc.type==='hq'||sc.type==='tech'||sc.type==='vision'||sc.type==='host');
  if(TODAY>e) return isHq?'bar-hq-done':'bar-out-done';
  if(TODAY>=s)return isHq?'bar-hq-going':'bar-out-going';
  return           isHq?'bar-hq-plan':'bar-out-plan';
}

/* ── 타임라인 ── */
var WPX=42,_months=[],_totPx=0,_sd=null;
function calcRange(){
  var minD=new Date(TODAY.getFullYear(),TODAY.getMonth()-1,1),maxD=new Date(TODAY.getFullYear(),TODAY.getMonth()+3,0);
  var all=[];S.schedules.forEach(function(s){all.push(s.start);all.push(s.end);});S.events.forEach(function(e){all.push(e.date);});
  if(all.length){var sorted=all.map(function(d){return pd(d);}).sort(function(a,b){return a-b;});if(sorted[0]<minD)minD=new Date(sorted[0].getFullYear(),sorted[0].getMonth(),1);var mx=sorted[sorted.length-1];var mxE=new Date(mx.getFullYear(),mx.getMonth()+2,0);if(mxE>maxD)maxD=mxE;}
  return{start:minD,end:maxD};
}
function initTL(){
  var r=calcRange();_sd=new Date(r.start);_sd.setHours(0,0,0,0);_months=[];
  var cur=new Date(r.start.getFullYear(),r.start.getMonth(),1);
  while(cur<=r.end){var y=cur.getFullYear(),m=cur.getMonth()+1,days=new Date(y,m,0).getDate();_months.push({y:y,m:m,days:days,weeks:Math.ceil(days/7),label:(m===1?y+'년 ':'')+m+'월'});cur=new Date(y,m,1);}
  _totPx=Math.round(_months.reduce(function(s,m){return s+m.days;},0)/7*WPX);
}
function d2px(ds){return Math.round(Math.max(0,Math.round((pd(ds)-_sd)/86400000))/7*WPX);}
function tpx(){var y=TODAY.getFullYear(),m=String(TODAY.getMonth()+1).padStart(2,'0'),d=String(TODAY.getDate()).padStart(2,'0');return d2px(y+'-'+m+'-'+d);}
function mPx(mon){return Math.round(mon.days/7*WPX);}
function wPx(mon,wi){var s=wi*7+1,e=Math.min(s+6,mon.days);return Math.round((e-s+1)/7*WPX);}

/* 이벤트 칩 겹침 처리 */
function addEv(el,evts,chips){
  evts.forEach(function(evt){
    var col=EVC.find(function(c){return c.id===evt.colorId;})||EVC[0];
    var px=d2px(evt.date);
    var ln=document.createElement('div');ln.className='evln';ln.style.cssText='left:'+px+'px;background:'+col.bg+';opacity:'+(chips?'.9':'.25');el.appendChild(ln);
    if(!chips)return;
    var ch=document.createElement('div');ch.className='evchip';
    ch.style.cssText='left:'+(px+3)+'px;background:'+col.bg;
    ch.setAttribute('data-px', px);
    ch.title=fmt(evt.date)+' '+evt.title; // hover 시 전체 내용
    ch.textContent=fmt(evt.date)+' '+evt.title;
    ch.onclick=(function(id){return function(){openEditEv(id);};})(evt.id);
    el.appendChild(ch);
  });
  // 겹침 처리: 칩들을 px 기준 정렬 후 가까운 것은 너비 제한
  if(chips){
    var chipEls=Array.prototype.slice.call(el.querySelectorAll('.evchip')).sort(function(a,b){return parseInt(a.getAttribute('data-px'))-parseInt(b.getAttribute('data-px'));});
    for(var i=0;i<chipEls.length-1;i++){
      var cur=chipEls[i], next=chipEls[i+1];
      var curPx=parseInt(cur.getAttribute('data-px'));
      var nextPx=parseInt(next.getAttribute('data-px'));
      var gap=nextPx-curPx;
      if(gap<80){  // 80px 이내면 겹침
        cur.style.maxWidth=Math.max(gap-6,20)+'px';
        cur.style.overflow='hidden';
        cur.style.textOverflow='ellipsis';
      }
    }
  }
}

function makeTL(h,cls,evts,chips){var el=document.createElement('div');el.className=cls;el.style.cssText='flex:1;position:relative;min-height:'+h+'px;height:'+h+'px';addGrid(el);addTodayLine(el);if(evts)addEv(el,evts,chips);return el;}
function addBar(el,sched){
  var sp=d2px(sched.start),ep=d2px(sched.end)+Math.round(WPX/7),wp=Math.max(ep-sp,8);

function addWtBar(el,wt){

/* ── 간트 렌더 ── */
/* 작업 레인 배정: 겹치는 작업은 별도 행으로 분리 */
function assignWtLanes(wts){
  // wts: [{start,end,...}] → 각 wt에 lane 번호 부여
  var lanes=[]; // lanes[i] = 마지막으로 끝난 날짜
  wts.forEach(function(wt){
    var assigned=false;
    for(var i=0;i<lanes.length;i++){
      if(wt.start>lanes[i]){ // 이 레인에 들어갈 수 있음
        wt._lane=i;lanes[i]=wt.end;assigned=true;break;
      }
    }
    if(!assigned){wt._lane=lanes.length;lanes.push(wt.end);}
  });
  return lanes.length;
}

function renderGantt(){
  var body=document.getElementById('gbody');body.innerHTML='';
  // S.sites 순서 기준으로 프로젝트 정렬
  var siteOrder={};S.sites.forEach(function(s,i){siteOrder[s.id]=i;});
  var projs=S.projects.filter(function(p){
    if(S.filterSite!=='all'&&p.siteId!==S.filterSite)return false;
    var hasVisible=S.schedules.some(function(s){return s.projectId===p.id&&(!s.hidden||S.showHidden);});
    var hasEvent=S.events.some(function(e){return e.projectId===p.id;});
    var hasWork=S.workTasks.some(function(w){return w.projectId===p.id;});
    return hasVisible||hasEvent||hasWork;
  }).sort(function(a,b){return (siteOrder[a.siteId]||0)-(siteOrder[b.siteId]||0);});

  if(!projs.length){body.innerHTML='<div class="empty">등록된 출장 일정이 없습니다.</div>';return;}
  var ri=0;
  projs.forEach(function(proj){
    var site=S.sites.find(function(s){return s.id===proj.siteId;});var sc=site?site.color:'#666';
    var scheds=S.schedules.filter(function(s){return s.projectId===proj.id&&(!s.hidden||S.showHidden);});
    var evts=S.events.filter(function(e){return e.projectId===proj.id;});
    var wts=S.workTasks.filter(function(w){return w.projectId===proj.id;}).map(function(w){return JSON.parse(JSON.stringify(w));});
    // 작업 레인 배정
    var wtLanes=0;
    if(wts.length){
      wts.sort(function(a,b){return a.start>b.start?1:-1;});
      wtLanes=assignWtLanes(wts);
    }
    // 그룹 헤더
    var grp=document.createElement('div');grp.className='grprow';
    var gf=document.createElement('div');gf.className='grpfix';gf.innerHTML='<span class="grpbadge" style="background:'+sc+'">'+(site?site.name:proj.siteId)+'</span><span class="grpname">'+proj.name+'</span>';
    grp.appendChild(gf);grp.appendChild(makeTL(26,'grptl',evts,false));body.appendChild(grp);
    // 이벤트 행
    if(evts.length){var er=document.createElement('div');er.className='evrow';var ef=document.createElement('div');ef.className='evfix';ef.textContent='★ 주요 이벤트';er.appendChild(ef);er.appendChild(makeTL(22,'evtl',evts,true));body.appendChild(er);}
    // ── 작업 행 (레인별)
    if(wts.length){
      // 작업 섹션 헤더
      var wsec=document.createElement('div');wsec.className='wksecrow';
      var wsf=document.createElement('div');wsf.className='wksecfix';wsf.innerHTML='<span class="wksecfix-lbl">▣ 작업</span>';
      var wst=makeTL(18,'wksectrl',null,false);
      wsec.appendChild(wsf);wsec.appendChild(wst);body.appendChild(wsec);
      for(var li=0;li<wtLanes;li++){
        var laneTasks=wts.filter(function(w){return w._lane===li;});
        var wkr=document.createElement('div');wkr.className='wkrow';
        var wkf=document.createElement('div');wkf.className='wkfix';
        // 레인 레이블: 첫 번째 작업 제목 표시 (여러 개면 숫자)
        var laneLabel=laneTasks.length===1?laneTasks[0].title:(li+1)+'번 레인 ('+laneTasks.length+'건)';
        wkf.innerHTML='<span class="wkfix-label">'+laneLabel+'</span>';
        var wktl=makeTL(22,'wktl',null,false);
        // 각 작업 바 추가
        laneTasks.forEach(function(wt){
          addWtBar(wktl,wt);
        });
        wkr.appendChild(wkf);wkr.appendChild(wktl);body.appendChild(wkr);
      }
    }
    // 출장 행
    var tasks=[];scheds.forEach(function(s){if(tasks.indexOf(s.task)<0)tasks.push(s.task);});
    tasks.forEach(function(task){
      scheds.filter(function(s){return s.task===task;}).forEach(function(sched,idx){
        var days=dd(sched.start,sched.end),dr=fmt(sched.start)+'~'+fmt(sched.end);
        var isDone=TODAY>pd(sched.end);var isEven=(ri%2===0);ri++;
        var row=document.createElement('div');
        row.className='grow '+(isEven?'even':'odd')+(isDone?' done':'')+(sched.hidden?' hidden-row':'');
        var gf2=document.createElement('div');gf2.className='gfix';
        var tc=TYPE_COLOR[sched.type]||'#555';var tl=TYPE_LBL[sched.type]||sched.type;
        gf2.innerHTML='<div class="gtask">'+(idx===0?task:'')+'</div>'
          +'<div class="gperson">'+sched.name
          +'<span class="type-badge" style="background:'+tc+'">'+tl+'</span>'
          +(isDone?'<span class="done-badge">완료</span>':'')
          +(sched.hidden?'<span class="hidden-badge">숨김</span>':'')
          +'<span class="gbadge">'+dr+' · '+days+'일</span></div>';
        var rtl=makeTL(28,'gtl',evts,false);addBar(rtl,sched);row.appendChild(gf2);row.appendChild(rtl);body.appendChild(row);
      });
    });
  });
  document.getElementById('gscroll').scrollLeft=Math.max(0,tpx()-120);
}

function upP(){var sid=document.getElementById('f_site').value;var ps=S.projects.filter(function(p){return p.siteId===sid;});document.getElementById('f_proj').innerHTML=ps.length?ps.map(function(p){return '<option value="'+p.id+'">'+p.name+'</option>';}).join(''):'<option value="">해당 사이트에 프로젝트 없음</option>';}
function fmtDateInput(el){
  // 숫자만 남기고 자동으로 - 삽입: 20260401 → 2026-04-01
  var v=el.value.replace(/[^0-9]/g,'');
  if(v.length>4) v=v.slice(0,4)+'-'+v.slice(4);
  if(v.length>7) v=v.slice(0,7)+'-'+v.slice(7);
  el.value=v.slice(0,10);
}
function calcD(){
  var s=document.getElementById('f_start').value;
  var e=document.getElementById('f_end').value;
  var re=/^\d{4}-\d{2}-\d{2}$/;
  var fs=document.getElementById('f_start');
  var fe=document.getElementById('f_end');
  if(fs) fs.style.borderColor=(!s||re.test(s))?'#3a3a44':'#b52020';
  if(fe) fe.style.borderColor=(!e||re.test(e))?'#3a3a44':'#b52020';
  if(s&&e&&re.test(s)&&re.test(e)){
    if(s<=e){
      document.getElementById('f_days').textContent=dd(s,e)+' 일';
      var db=document.getElementById('f_datebox');
      if(db)db.textContent=fmtFull(s)+' → '+fmtFull(e);
      if(fe) fe.style.borderColor='#3a3a44';
    } else {
      if(fe) fe.style.borderColor='#b52020';
      document.getElementById('f_days').textContent='날짜 오류';
    }
  }
}

  if(!dateRe.test(start)||!dateRe.test(end)){alert('날짜 형식이 올바르지 않아요.\n예: 2026-04-01');return;}

function buildGrpSiteRows(){
  var el=document.getElementById('grpSiteRows');if(!el)return;el.innerHTML='';
  S.groups.forEach(function(grp){
    // 그룹 헤더 행
    var gh=document.createElement('div');
    gh.style.cssText='display:flex;align-items:center;gap:5px;padding:5px 0 3px;border-bottom:1px solid #3a3a44;margin-bottom:3px';
    var ni=document.createElement('input');ni.type='text';ni.value=grp.name;
    ni.style.cssText='flex:1;font-size:11px;font-weight:600;color:#ccc;padding:2px 5px';
    ni.onchange=(function(gid){return function(){updGN(gid,this.value);};})(grp.id);
    var db=document.createElement('button');db.className='btn sm red';db.textContent='그룹삭제';
    db.onclick=(function(gid){return function(){delGroup(gid);};})(grp.id);
    gh.appendChild(ni);gh.appendChild(db);el.appendChild(gh);

    // 그룹 내 사이트들
    var grpSites=S.sites.filter(function(s){return (s.groupId||'_none')===grp.id;});
    grpSites.forEach(function(site,si){
      var row=document.createElement('div');row.className='mrow';row.style.paddingLeft='8px';row.draggable=true;
      var ic=document.createElement('input');ic.type='color';ic.value=site.color;
      ic.style.cssText='width:22px;height:22px;padding:0;border:none;background:none;cursor:pointer;flex-shrink:0';
      ic.onchange=(function(sid){return function(){updSC(sid,this.value);};})(site.id);
      var iname=document.createElement('input');iname.type='text';iname.value=site.name;
      iname.style.cssText='flex:1;min-width:60px;font-size:11px';
      iname.onchange=(function(sid){return function(){updSN(sid,this.value);};})(site.id);
      // 그룹 변경 select
      var gsel=document.createElement('select');
      gsel.style.cssText='font-size:10px;padding:2px 3px;max-width:80px';
      S.groups.forEach(function(g){var o=document.createElement('option');o.value=g.id;o.textContent=g.name;if(g.id===grp.id)o.selected=true;gsel.appendChild(o);});
      gsel.onchange=(function(sid){return function(){moveSiteGroup(sid,this.value);};})(site.id);
      var btnP=document.createElement('button');btnP.className='btn sm';btnP.textContent='PJT+';
      btnP.onclick=(function(sid){return function(){addP(sid);};})(site.id);
      var btnD=document.createElement('button');btnD.className='btn sm red';btnD.textContent='삭제';
      btnD.onclick=(function(sid){return function(){delSite(sid);};})(site.id);
      // 드래그
      (function(siteId,siteIdx){
        row.ondragstart=function(e){e.dataTransfer.effectAllowed='move';_dragIdx=siteIdx;};
        row.ondragover=function(e){e.preventDefault();row.classList.add('dover');};
        row.ondragleave=function(){row.classList.remove('dover');};
        row.ondrop=function(e){
          e.preventDefault();row.classList.remove('dover');
          if(_dragIdx===null||_dragIdx===siteIdx){_dragIdx=null;return;}
          var from=_dragIdx,to=siteIdx;_dragIdx=null;
          var moved=S.sites.splice(from,1)[0];S.sites.splice(to,0,moved);
          saveData();buildGrpSiteRows();renderAll();
        };
      })(site.id, S.sites.indexOf(site));
      [ic,iname,gsel,btnP,btnD].forEach(function(el2){row.appendChild(el2);});
      el.appendChild(row);
    });
    // 사이트 없을 때
    if(!grpSites.length){var empty=document.createElement('div');empty.style.cssText='font-size:10px;color:#555;padding:3px 8px';empty.textContent='(사이트 없음)';el.appendChild(empty);}
    // 그룹 간 간격
    var gap=document.createElement('div');gap.style.height='8px';el.appendChild(gap);
  });
}

function buildProjRows(){
  var el=document.getElementById('projRows');if(!el)return;el.innerHTML='';
  S.projects.forEach(function(p){
    var si=S.sites.find(function(s){return s.id===p.siteId;});
    var row=document.createElement('div');row.className='mrow';
    var chip=document.createElement('span');chip.className='grp-chip';
    chip.style.cssText='background:'+(si?si.color:'#555')+';color:#fff';chip.textContent=si?si.name:p.siteId;
    var ni=document.createElement('input');ni.type='text';ni.value=p.name;
    ni.style.cssText='flex:1;min-width:80px;font-size:11px';
    ni.onchange=(function(pid){return function(){updPN(pid,this.value);};})(p.id);
    var btnD=document.createElement('button');btnD.className='btn sm red';btnD.textContent='삭제';
    btnD.onclick=(function(pid){return function(){delPjt(pid);};})(p.id);
    [chip,ni,btnD].forEach(function(el2){row.appendChild(el2);});
    el.appendChild(row);
  });
}

/* 그룹 CRUD */
function addGroup(){
  var name=document.getElementById('ns_grp').value.trim();if(!name){alert('그룹명을 입력하세요.');return;}
  var id='g'+Date.now();S.groups.push({id:id,name:name});
  saveData();showSiteM();renderAll();
}
function delGroup(id){
  if(!confirm('그룹을 삭제하면 소속 사이트가 미분류됩니다. 계속할까요?'))return;
  S.sites.forEach(function(s){if(s.groupId===id)s.groupId='_none';});
  S.groups=S.groups.filter(function(g){return g.id!==id;});

}
function updGN(id,v){var g=S.groups.find(function(g){return g.id===id;});if(g){g.name=v.trim();saveData();renderSidebar();}}
function moveSiteGroup(sid,gid){var s=S.sites.find(function(s){return s.id===sid;});if(s){s.groupId=gid;saveData();buildGrpSiteRows();renderSidebar();renderGantt();}}

/* 사이트 CRUD */
function updSN(id,v){var s=S.sites.find(function(s){return s.id===id;});if(s){s.name=v.trim();saveData();renderSidebar();renderGantt();}}
function updSC(id,v){var s=S.sites.find(function(s){return s.id===id;});if(s){s.color=v;saveData();renderSidebar();renderGantt();}}
function addSite(){
  var name=document.getElementById('ns_n').value.trim(),color=document.getElementById('ns_c').value;
  var gid=document.getElementById('ns_grpsel').value;
  if(!name){alert('사이트 이름을 입력하세요.');return;}
  var baseId=name.replace(/[^a-zA-Z0-9가-힣]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'')||'site';
  var newId=baseId,n=2;while(S.sites.find(function(s){return s.id===newId;}))newId=baseId+'_'+n++;
  S.sites.push({id:newId,name:name,color:color,groupId:gid});
  saveData();showSiteM();renderAll();
}
function delSite(id){
  if(!confirm('사이트와 관련 항목을 모두 삭제합니까?'))return;
  var pids=S.projects.filter(function(p){return p.siteId===id;}).map(function(p){return p.id;});
  S.projects=S.projects.filter(function(p){return p.siteId!==id;});S.schedules=S.schedules.filter(function(s){return pids.indexOf(s.projectId)<0;});S.events=S.events.filter(function(e){return pids.indexOf(e.projectId)<0;});S.sites=S.sites.filter(function(s){return s.id!==id;});
  saveData();showSiteM();renderAll();
}

/* 프로젝트 CRUD */
function updPN(id,v){var p=S.projects.find(function(p){return p.id===id;});if(p){p.name=v.trim();saveData();renderGantt();}}
function addP(sid){
  var name=prompt('새 프로젝트 이름:');if(!name)return;
  var baseId=name.replace(/[^a-zA-Z0-9가-힣]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'')||'pjt';
  var newId=baseId,n=2;while(S.projects.find(function(p){return p.id===newId;}))newId=baseId+'_'+n++;
  S.projects.push({id:newId,siteId:sid,name:name});saveData();showSiteM();renderAll();
}
function delPjt(id){

  saveData();showSiteM();renderAll();
}

/* ════════════════════════════════════════════
   인원 출장일 관리
════════════════════════════════════════════ */

// ── 지역 분류 정의
// siteId 기준 (대소문자 insensitive)
var REGION_AMERICAS_IDS=[
  'ESHD','ESMI','ESHG','MILS','ESOT','UC2','현대JV','BOSK_TN'
];
var REGION_EUROPE_IDS=['WA','ESWA'];
// 나머지는 기타

function getSiteRegion(siteId){
  var sid=(siteId||'').toUpperCase();
  var americas=REGION_AMERICAS_IDS.map(function(x){return x.toUpperCase();});
  var europe=REGION_EUROPE_IDS.map(function(x){return x.toUpperCase();});
  if(americas.indexOf(sid)>=0) return 'americas';
  if(europe.indexOf(sid)>=0) return 'europe';
  return 'other';
}

// 출장 일수 계산 (시작일~종료일 겹치는 날짜 수)
// 클램프 없이 전체, 또는 범위 내 클램프
function calcOverlapDays(start, end, rangeStart, rangeEnd){
  var s=pd(start), e=pd(end);
  if(rangeStart) s=new Date(Math.max(s,pd(rangeStart)));
  if(rangeEnd)   e=new Date(Math.min(e,pd(rangeEnd)));
  if(s>e) return 0;
  return Math.round((e-s)/86400000)+1;
}

// 롤링 12개월 범위
function getRolling12(){
  var end=new Date(TODAY);
  var start=new Date(TODAY.getFullYear()-1,TODAY.getMonth(),TODAY.getDate());
  start.setHours(0,0,0,0);
  end.setHours(0,0,0,0);
  return {start:start,end:end};
}

// 이름 기준으로 전체 출장 목록 집계
// returns { name, type, trips: [{siteId,siteName,siteColor,start,end,region,days,status}] }
function aggregatePersonTrips(){
  var persons={};
  S.schedules.forEach(function(sc){
    if(sc.hidden&&!S.showHidden) return;
    var proj=S.projects.find(function(p){return p.id===sc.projectId;});
    if(!proj) return;
    var site=S.sites.find(function(s){return s.id===proj.siteId;});
    var siteId=proj.siteId;
    var siteName=site?site.name:siteId;
    var siteColor=site?site.color:'#555';
    var region=getSiteRegion(siteId);
    var s=pd(sc.start),e=pd(sc.end);
    var status=TODAY>e?'done':(TODAY>=s?'going':'plan');
    var totalDays=dd(sc.start,sc.end);

    var key=sc.name;
    if(!persons[key]) persons[key]={name:sc.name,type:sc.type,trips:[]};
    // type 우선순위: hq > tech > vision > host > outsource
    var typePri={hq:5,tech:4,vision:3,host:2,outsource:1};
    if((typePri[sc.type]||0)>(typePri[persons[key].type]||0)) persons[key].type=sc.type;
    persons[key].trips.push({
      siteId:siteId,siteName:siteName,siteColor:siteColor,
      region:region,start:sc.start,end:sc.end,
      days:totalDays,status:status,task:sc.task,note:sc.note
    });
  });
  // 각 인원의 trips를 시작일 정렬
  Object.keys(persons).forEach(function(k){
    persons[k].trips.sort(function(a,b){return a.start>b.start?1:-1;});
  });
  return persons;
}

// 오늘 기준 한국 체류일 계산
// 모든 출장 기간을 합친 후 (과거분만) 한국에 있었던 날짜 추정
// 출발일부터 복귀일까지는 해외, 그 이전/이후는 한국으로 가정
// 기준 기간 내 (rolling 12M) 해외 일수를 제외한 일수
function calcKoreaDays(trips, rolling12){
  // 한국 기준일: rolling 시작부터 오늘까지의 기간
  var totalRange=Math.round((rolling12.end-rolling12.start)/86400000)+1;
  // 해외 일수 (미주+유럽+기타 모두)
  var overseasDays=0;
  trips.forEach(function(t){
    var o=calcOverlapDays(t.start,t.end,rolling12.start,rolling12.end);
    overseasDays+=o;
  });
  // 겹치는 출장 기간이 있을 경우 중복 제거 필요
  // 날짜 배열로 중복 제거
  var overseasSet={};
  trips.forEach(function(t){
    var s=new Date(Math.max(pd(t.start),rolling12.start));
    var e=new Date(Math.min(pd(t.end),rolling12.end));
    if(s>e) return;
    var cur=new Date(s);
    while(cur<=e){
      var key=cur.getFullYear()+'-'+cur.getMonth()+'-'+cur.getDate();
      overseasSet[key]=true;
      cur.setDate(cur.getDate()+1);
    }
  });
  var uniqueOverseas=Object.keys(overseasSet).length;
  return totalRange-uniqueOverseas;
}

// 현재 체류 중인 곳 (오늘 기준)
function getCurrentLocation(trips){
  for(var i=0;i<trips.length;i++){
    var t=trips[i];
    if(TODAY>=pd(t.start)&&TODAY<=pd(t.end)){
      return {onTrip:true,siteName:t.siteName,siteColor:t.siteColor,region:t.region,endDate:t.end};
    }
  }
  return {onTrip:false};
}

// 상태 뱃지
function statusHtml(st){
  if(st==='going') return '<span class="pm-trip-status status-going">출장중</span>';
  if(st==='plan')  return '<span class="pm-trip-status status-plan">예정</span>';
  return '<span class="pm-trip-status status-done">완료</span>';
}

var _pmFilter='all'; // 'all','americas','europe','other','current'

function renderPersonTab(){
  var wrap=document.getElementById('pmWrap');
  if(!wrap) return;
  var persons=aggregatePersonTrips();
  var names=Object.keys(persons);
  if(!names.length){wrap.innerHTML='<div class="pm-empty" style="padding:40px;text-align:center">등록된 출장 일정이 없습니다.</div>';return;}

  var rolling12=getRolling12();
  var r12s=rolling12.start.getFullYear()+'.'+(rolling12.start.getMonth()+1)+'.'+rolling12.start.getDate();
  var r12e=rolling12.end.getFullYear()+'.'+(rolling12.end.getMonth()+1)+'.'+rolling12.end.getDate();

  // 통계 집계
  var totalPersons=names.length;
  var onTripNow=names.filter(function(n){return getCurrentLocation(persons[n].trips).onTrip;}).length;
  var americasPersons=names.filter(function(n){return persons[n].trips.some(function(t){return t.region==='americas';});}).length;
  var europePersons=names.filter(function(n){return persons[n].trips.some(function(t){return t.region==='europe';});}).length;

  var html='';
  // 통계 카드
  html+='<div class="pm-stats-row">';
  html+='<div class="pm-stat-card"><div class="pm-stat-val">'+totalPersons+'</div><div class="pm-stat-lbl">등록 인원</div><div class="pm-stat-sub">전체 출장자</div></div>';
  html+='<div class="pm-stat-card"><div class="pm-stat-val" style="color:#2176cc">'+onTripNow+'</div><div class="pm-stat-lbl">현재 출장 중</div><div class="pm-stat-sub">오늘 기준</div></div>';
  html+='<div class="pm-stat-card"><div class="pm-stat-val" style="color:#1a8c66">'+americasPersons+'</div><div class="pm-stat-lbl">미주 경험 인원</div><div class="pm-stat-sub">B1 비자 대상</div></div>';
  html+='<div class="pm-stat-card"><div class="pm-stat-val" style="color:#cc8010">'+europePersons+'</div><div class="pm-stat-lbl">유럽 경험 인원</div><div class="pm-stat-sub">ESWA(WA) 등</div></div>';
  html+='</div>';

  // 필터 바
  html+='<div class="pm-filter-bar">';
  html+='<span style="font-size:11px;color:#666">필터:</span>';
  ['all','current','americas','europe','other'].forEach(function(f){
    var lbl={all:'전체',current:'출장중',americas:'미주',europe:'유럽',other:'기타 지역'}[f];
    html+='<button class="pm-filter-btn'+((_pmFilter===f)?' on':'')+'" onclick="setPmFilter(\''+f+'\')">'+lbl+'</button>';
  });
  html+='<span style="font-size:10px;color:#555;margin-left:4px">롤링 12개월: '+r12s+' ~ '+r12e+'</span>';
  html+='</div>';

  // ── 미주 섹션
  var americasList=names.filter(function(n){
    var p=persons[n];
    if(_pmFilter==='current') return getCurrentLocation(p.trips).onTrip;
    if(_pmFilter==='europe') return p.trips.some(function(t){return t.region==='europe';});
    if(_pmFilter==='other') return p.trips.some(function(t){return t.region==='other';});
    if(_pmFilter==='americas') return p.trips.some(function(t){return t.region==='americas';});
    return p.trips.some(function(t){return t.region==='americas';});
  });

  if((_pmFilter==='all'||_pmFilter==='americas'||_pmFilter==='current')&&americasList.length){
    html+=renderRegionSection(persons, americasList, 'americas', rolling12);
  }

  // ── 유럽 섹션
  var europeList=names.filter(function(n){
    var p=persons[n];
    if(_pmFilter==='americas'||_pmFilter==='other') return false;
    if(_pmFilter==='current') return getCurrentLocation(p.trips).onTrip&&p.trips.some(function(t){return t.region==='europe';});
    if(_pmFilter==='europe') return p.trips.some(function(t){return t.region==='europe';});
    return p.trips.some(function(t){return t.region==='europe';});
  });

  if((_pmFilter==='all'||_pmFilter==='europe'||_pmFilter==='current')&&europeList.length){
    html+=renderRegionSection(persons, europeList, 'europe', rolling12);
  }

  // ── 기타 섹션
  var otherList=names.filter(function(n){
    var p=persons[n];
    if(_pmFilter==='americas'||_pmFilter==='europe') return false;
    if(_pmFilter==='current') return getCurrentLocation(p.trips).onTrip&&p.trips.some(function(t){return t.region==='other';});
    if(_pmFilter==='other') return p.trips.some(function(t){return t.region==='other';});
    return p.trips.some(function(t){return t.region==='other';});
  });

  if((_pmFilter==='all'||_pmFilter==='other'||_pmFilter==='current')&&otherList.length){
    html+=renderRegionSection(persons, otherList, 'other', rolling12);
  }

  if(!americasList.length&&!europeList.length&&!otherList.length){
    html+='<div class="pm-empty" style="padding:30px 10px;text-align:center;color:#555">해당 조건의 인원이 없습니다.</div>';
  }

  wrap.innerHTML=html;
}

function setPmFilter(f){
  _pmFilter=f;
  renderPersonTab();
}

function renderRegionSection(persons, nameList, region, rolling12){
  var labels={
    americas:{title:'미주 출장',sub:'ESHD · ESMI · ESHG · MILS · ESOT · UC2 · 현대JV · BOSK_TN',color:'#1a8c66',icon:'#1a8c66',b1:true},
    europe:  {title:'유럽 출장',sub:'ESWA / WA 등',color:'#cc8010',icon:'#cc8010',b1:false},
    other:   {title:'기타 지역 출장',sub:'그 외 사이트',color:'#534AB7',icon:'#534AB7',b1:false}
  };
  var L=labels[region];
  var html='<div class="pm-section">';
  html+='<div class="pm-sec-head">';
  html+='<div class="pm-sec-icon" style="background:'+L.icon+'"></div>';
  html+='<span class="pm-sec-title">'+L.title+'</span>';
  html+='<span class="pm-sec-sub">'+L.sub+'</span>';
  if(L.b1) html+='<span class="pm-sec-badge" style="background:#1a3a1a;border:1px solid #2a6a2a">B1 비자 관리</span>';
  html+='</div>';

  html+='<table class="pm-table"><thead><tr>'
    +'<th style="width:130px">이름</th>'
    +'<th style="width:80px">현 위치</th>'
    +(L.b1?'<th style="width:110px">미주 출장일 (12M)</th>':'<th style="width:110px">출장일 합계</th>')
    +'<th style="width:100px">한국 체류일 (12M)</th>'
    +'<th>출장 내역</th>'
    +'</tr></thead><tbody>';

  nameList.forEach(function(name){
    var p=persons[name];
    var regionTrips=p.trips.filter(function(t){return t.region===region;});
    var allTrips=p.trips;

    // 지역별 롤링 12M 일수
    var rolling12Days=0;
    var rolling12Set={};
    regionTrips.forEach(function(t){
      var s=new Date(Math.max(pd(t.start),rolling12.start));
      var e=new Date(Math.min(pd(t.end),rolling12.end));
      if(s>e) return;
      var cur=new Date(s);
      while(cur<=e){
        var key=cur.getFullYear()+'-'+cur.getMonth()+'-'+cur.getDate();
        rolling12Set[key]=true;
        cur.setDate(cur.getDate()+1);
      }
    });
    rolling12Days=Object.keys(rolling12Set).length;

    // 한국 체류일 (전체 출장 기준 rolling 12M)
    var koreaDays=calcKoreaDays(allTrips, rolling12);

    // 현재 위치
    var loc=getCurrentLocation(allTrips);

    // B1 경고 레벨 (미주만)
    var b1Class='', b1Note='';
    if(L.b1){
      if(rolling12Days>=150){b1Class='b1-alert';b1Note='⚠ 체류 주의 (150일+)';}
      else if(rolling12Days>=120){b1Class='b1-warn';b1Note='주의 구간 (120일+)';}
      else {b1Class='b1-ok';}
    }

    html+='<tr>';
    // 이름 + 유형
    var tc=TYPE_COLOR[p.type]||'#555';var tl=TYPE_LBL[p.type]||p.type;
    html+='<td><div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">'
      +'<span class="pm-name">'+name+'</span>'
      +'<span class="pm-type" style="background:'+tc+'">'+tl+'</span>'
      +'</div></td>';

    // 현 위치
    if(loc.onTrip){
      html+='<td><div style="display:flex;flex-direction:column;gap:2px">'
        +'<span style="font-size:11px;font-weight:600;color:'+loc.siteColor+'">'+loc.siteName+'</span>'
        +'<span style="font-size:10px;color:#666">~'+fmt(loc.endDate)+'</span>'
        +'</div></td>';
    } else {
      html+='<td><span style="font-size:11px;color:#4aaa70">🇰🇷 국내</span></td>';
    }

    // 지역 출장일
    var barPct=Math.min(100,Math.round(rolling12Days/180*100));
    var barColor=L.b1?(rolling12Days>=150?'#e84040':rolling12Days>=120?'#e8a020':'#1a8c66'):'#534AB7';
    html+='<td>';
    html+='<div style="display:flex;align-items:baseline;gap:2px">';
    html+='<span class="pm-days-big '+(L.b1?b1Class:'')+'" style="font-size:20px">'+rolling12Days+'</span>';
    html+='<span class="pm-days-unit">일</span>';
    html+='</div>';
    if(L.b1){
      html+='<div class="pm-bar-wrap" style="margin-top:4px"><div class="pm-bar-fill" style="width:'+barPct+'%;background:'+barColor+'"></div></div>';
      if(b1Note) html+='<div style="font-size:10px;color:'+barColor+';margin-top:2px">'+b1Note+'</div>';
    }
    html+='</td>';

    // 한국 체류일
    var krClass=koreaDays<0?'pm-kr-neg':'pm-kr-days';
    html+='<td><span class="'+krClass+'" style="font-size:16px;font-weight:600">'+Math.max(0,koreaDays)+'</span><span class="pm-days-unit"> 일</span></td>';

    // 출장 내역 (지역 필터)
    html+='<td><div class="pm-trips">';
    regionTrips.forEach(function(t){
      var r12Days=calcOverlapDays(t.start,t.end,rolling12.start,rolling12.end);
      var totalD=dd(t.start,t.end);
      html+='<div class="pm-trip-row">';
      html+='<span class="pm-trip-site" style="background:'+t.siteColor+'">'+t.siteName+'</span>';
      html+='<span class="pm-trip-period">'+fmtFull(t.start)+' → '+fmtFull(t.end)+'</span>';
      html+='<span class="pm-trip-days" style="color:#ccc">'+totalD+'일';
      if(r12Days>0&&r12Days<totalD) html+=' <span style="color:#666;font-size:10px">(12M내 '+r12Days+'일)</span>';
      html+='</span>';
      html+=statusHtml(t.status);
      if(t.task) html+='<span style="font-size:10px;color:#666">'+t.task+'</span>';
      html+='</div>';
    });
    if(!regionTrips.length) html+='<span class="pm-empty">내역 없음</span>';
    html+='</div></td>';
    html+='</tr>';
  });

  html+='</tbody></table>';
  if(L.b1){
    html+='<div class="pm-b1-note">* 미주 출장일은 롤링 12개월(오늘 기준 최근 1년) 기준 체류일입니다. B1/B2 비자 상한(180일/년)을 참고로 표시합니다.</div>';
  }
  html+='</div>';
  return html;
}
