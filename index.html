<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>출장 일정 관리</title>
  <meta name="description" content="Vision 현장 출장 일정 & 인원 출장일 관리">
  <meta name="format-detection" content="date=no,telephone=no,address=no">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="ttl">출장 일정 관리</span>
        <div class="conn-dot" id="connStatus" onclick="checkConn()" title="클릭하면 연결 상태 확인">
          <div class="conn-led" id="connLed"></div>
          <span id="connTxt">연결 확인</span>
        </div>
      </div>
      <div class="tright" id="topbarRight">
        <div id="ganttTools" style="display:flex;gap:5px;align-items:center;flex-wrap:nowrap">
          <div class="leg">
            <div class="legg">
              <span class="legl">본사계열</span>
              <div class="legi"><div class="legd" style="background:#4a4a6a"></div>완료</div>
              <div class="legi"><div class="legd" style="background:#2176cc"></div>출장중</div>
              <div class="legi"><div class="legd" style="background:#0f9e6e"></div>예정</div>
            </div>
            <div class="legs"></div>
            <div class="legg">
              <span class="legl">외주계열</span>
              <div class="legi"><div class="legd" style="background:#5a4a2a"></div>완료</div>
              <div class="legi"><div class="legd" style="background:#cc8010"></div>출장중</div>
              <div class="legi" style="border-right:none"><div class="legd" style="background:#8a6e00"></div>예정</div>
            </div>
          </div>
          <input type="text" id="ganttSearchInput" class="gantt-search" placeholder="검색" oninput="ganttSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
          <div style="display:flex;gap:2px">
            <button class="btn active" id="zoomBtn_week" onclick="setGanttZoom('week')">주</button>
            <button class="btn" id="zoomBtn_biweek" onclick="setGanttZoom('biweek')">격주</button>
            <button class="btn" id="zoomBtn_month" onclick="setGanttZoom('month')">월</button>
          </div>
          <button class="btn" id="btnHidden" onclick="toggleShowHidden()">숨김 보기</button>
          <button class="btn" onclick="openModal('site')">사이트 관리</button>
          <button class="btn ev" onclick="openModal('event')">★ 이벤트 등록</button>
          <button class="btn pri" onclick="openModal('schedule')">+ 출장 등록</button>
        </div>
        <div id="equipTools" style="display:none;gap:5px;align-items:center;flex-wrap:wrap">
          <button class="btn" onclick="collapseAllEquip()">접기 전체</button>
          <button class="btn" onclick="expandAllEquip()">펼치기 전체</button>
          <button class="btn" id="btnEquipEdit" onclick="toggleEquipEdit()">수정 모드</button>
          <button class="btn" id="btnAddEquipSite" onclick="openAddEquipSite()" style="display:none">+ 사이트</button>
          <button class="btn" id="btnAddEquipProject" onclick="openAddEquipProject()" style="display:none">+ 프로젝트</button>
          <button class="btn" id="btnAddEquipUnit" onclick="openAddEquipUnit()" style="display:none">+ 호기</button>
          <button class="btn warn" id="btnAddEquipItem" onclick="openAddEquipItem()" style="display:none">+ 항목</button>
        </div>
        <button class="btn" onclick="downloadExcel()">⬇ 엑셀</button>
        <button class="btn" onclick="openSheetsSettings()">⚙ Sheets 설정</button>
        <button class="btn" onclick="showQR()" title="이 페이지 QR 코드">QR</button>
      </div>
    </div>
    <div class="tab-bar">
      <div class="tab-nav">
        <button class="tab-btn on" id="tab_gantt" onclick="switchTab('gantt')">📅 간트 차트</button>
        <button class="tab-btn" id="tab_person" onclick="switchTab('person')">👤 인원 출장일</button>
        <button class="tab-btn" id="tab_equip" onclick="switchTab('equip')">🏭 설비 진행율</button>
      </div>
    </div>
    <div class="content" id="view_gantt">
      <div class="sidebar">
        <div class="sbhead"><span class="slbl">사이트 필터</span></div>
        <div class="sbody" id="siteList"></div>
      </div>
      <div class="main">
        <div class="gscroll" id="gscroll">
          <div class="gwrap" id="gwrap">
            <div class="ghrow">
              <div class="ghinner">
                <div class="ghfixed">
                  <div class="ghc" style="width:68px;min-width:68px;max-width:68px">업무</div>
                  <div class="ghc">출장자</div>
                </div>
                <div class="ghtl" id="ghTl"></div>
              </div>
              <div class="ghdb">
                <div class="ghdbf"></div>
                <div class="ghdbt" id="ghDb"></div>
              </div>
            </div>
            <div id="gbody"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="content" id="view_person" style="display:none">
      <div class="pm-wrap" id="pmWrap">
        </div>
    </div>
    <div class="content" id="view_equip" style="display:none">
      <div class="sidebar" id="equipSidebar"></div>
      <div class="main" style="overflow:hidden;display:flex;flex-direction:column">
        <div id="eqSummary"></div>
        <div class="eq-scroll" id="eqScroll">
          <div id="eqGrid"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="mc"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="gantt.js"></script>
  <script src="modals.js"></script>
  <script src="person.js"></script>
  <script src="equip.js"></script>
  <script src="export.js"></script>
</body>
</html>
