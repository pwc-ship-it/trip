<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>출장 일정 관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#18181e}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:#e8e8ec}
.app{position:fixed;inset:0;display:flex;flex-direction:column;background:#18181e}
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:7px 14px;border-bottom:1.5px solid #555;background:#20202e;flex-wrap:wrap;gap:5px}
.ttl{font-size:14px;font-weight:600;color:#e8e8ec;white-space:nowrap}
.tright{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.btn{padding:4px 11px;font-size:11px;border:1px solid #555;border-radius:5px;cursor:pointer;background:transparent;color:#e8e8ec;transition:background .15s}
.btn:hover{background:#252535}
.btn.pri{background:#1a6bbf;color:#fff;border-color:#155299}.btn.pri:hover{background:#155299}
.btn.ev{background:#534AB7;color:#fff;border-color:#3C3489}.btn.ev:hover{background:#3C3489}
.btn.gsh{background:#1a6b3a;color:#fff;border-color:#0f4a28}.btn.gsh:hover{background:#0f4a28}
.btn.sm{padding:2px 8px;font-size:11px}
.btn.red{background:#b52020;color:#fff;border-color:#7a1010}
.btn.warn{background:#7a5500;color:#fff;border-color:#5a3d00}
.btn.active{background:#534AB7;color:#fff;border-color:#3C3489}
.btn.policy-tab{background:#2a4a2a;color:#7acc7a;border-color:#3a6a3a}
.btn.policy-tab.on{background:#1a6b3a;color:#fff;border-color:#0f4a28}
/* 범례 */
.leg{display:flex;align-items:center;border:1px solid #3a3a44;border-radius:5px;overflow:hidden}
.legg{display:flex;align-items:center}
.legl{font-size:10px;color:#666;padding:0 6px;border-right:1px solid #3a3a44;white-space:nowrap;line-height:26px}
.legi{display:flex;align-items:center;gap:3px;padding:3px 7px;border-right:1px solid #3a3a44;font-size:10px;color:#b0b0b8}
.legi:last-child{border-right:none}
.legd{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.legs{width:1.5px;background:#555;align-self:stretch}
/* 레이아웃 */
.content{display:flex;flex:1;min-height:0;overflow:hidden}
.sidebar{width:185px;min-width:185px;flex-shrink:0;border-right:1.5px solid #555;background:#1e1e28;overflow-y:auto;display:flex;flex-direction:column}
.sbhead{padding:8px 10px 4px;border-bottom:1px solid #2a2a34}
.slbl{font-size:10px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.05em}
.sbody{padding:6px 8px;flex:1}
.grplbl{font-size:10px;font-weight:600;color:#888;padding:6px 4px 3px;letter-spacing:.04em;text-transform:uppercase;border-bottom:1px solid #2a2a34;margin-bottom:2px}
.sit{display:flex;align-items:center;padding:3px 5px;border-radius:4px;cursor:pointer;border:1px solid transparent;margin-bottom:1px}
.sit:hover{background:#252535}.sit.on{background:#1e2a3a;border-color:#3a3a44}
.sit-all{display:flex;align-items:center;padding:4px 5px;border-radius:4px;cursor:pointer;border:1px solid transparent;margin-bottom:6px}
.sit-all:hover{background:#252535}.sit-all.on{background:#1e2a3a;border-color:#3a3a44}
.sdot{width:7px;height:7px;border-radius:50%;margin-right:5px;flex-shrink:0}
.sname{flex:1;font-size:11px;color:#c8c8d0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scnt{font-size:9px;padding:1px 4px;border-radius:5px;background:#252535;color:#888;border:1px solid #3a3a44;flex-shrink:0}
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
/* 간트 헤더 */
.gscroll{flex:1;overflow:auto}
.gwrap{display:inline-block;min-width:100%}
.ghrow{display:flex;flex-direction:column;position:sticky;top:0;z-index:30;border-bottom:2px solid #555;background:#1a1a28}
.ghinner{display:flex}
.ghfixed{width:300px;min-width:300px;flex-shrink:0;display:flex;border-right:2px solid #555;position:sticky;left:0;z-index:35;background:#1a1a28}
.ghc{flex:1;padding:4px 8px;font-size:11px;font-weight:500;color:#b0b0b8;border-right:1px solid #3a3a44}
.ghc:last-child{border-right:none}
.ghtl{display:flex;flex:1}
.ghmb{display:flex;flex-direction:column;border-right:1.5px solid #555;flex-shrink:0}
.ghmn{padding:3px 8px;font-size:11px;font-weight:500;color:#e8e8ec;border-bottom:1px solid #3a3a44;background:#1a1a28;white-space:nowrap}
.ghwks{display:flex}
.ghwk{font-size:10px;color:#666;padding:2px 0;border-right:1px solid #2a2a34;text-align:center;white-space:nowrap;flex-shrink:0;background:#20202e}
.ghdb{display:flex;height:17px;border-top:1px solid #3a3a44;background:#20202e}
.ghdbf{width:300px;min-width:300px;flex-shrink:0;border-right:2px solid #555;position:sticky;left:0;z-index:35;background:#20202e}
.ghdbt{flex:1;position:relative;height:17px}
.tdln{position:absolute;top:0;bottom:0;width:2px;background:#ff5555;opacity:.9;z-index:9;pointer-events:none}
.tdlb{position:absolute;top:1px;font-size:9px;font-weight:600;color:#ff5555;white-space:nowrap;z-index:10;padding:0 3px;border-radius:2px;background:#20202e;border:1px solid #ff5555}
/* 간트 행 */
.grprow{display:flex;align-items:stretch;border-top:2px solid #555;border-bottom:1px solid #3a3a44}
.grpfix{width:300px;min-width:300px;flex-shrink:0;padding:5px 10px;display:flex;align-items:center;gap:6px;border-right:2px solid #555;background:#222230;position:sticky;left:0;z-index:20}
.grpbadge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:7px;color:#fff;white-space:nowrap;flex-shrink:0}
.grpname{font-size:12px;font-weight:500;color:#e8e8ec}
.evrow{display:flex;align-items:stretch;border-bottom:1px solid #3a3a44}
.evfix{width:300px;min-width:300px;flex-shrink:0;border-right:2px solid #555;display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:500;color:#b0b0b8;position:sticky;left:0;z-index:20;background:#1e1e28}
.evtl{flex:1;position:relative;height:22px;background:#181820}
.grow{display:flex;align-items:stretch;border-bottom:1px solid #2a2a34}
.grow.even{background:#1c1c24}.grow.odd{background:#181820}
.grow:hover{background:#1e2a3a!important}.grow:hover .gfix{background:#1e2a3a!important}
.grow.hidden-row{opacity:.3}
.gfix{width:300px;min-width:300px;flex-shrink:0;display:flex;border-right:2px solid #555;align-items:center;position:sticky;left:0;z-index:20}
.grow.even .gfix{background:#1c1c24}.grow.odd .gfix{background:#181820}
.gtask{width:68px;min-width:68px;padding:0 7px;font-size:11px;color:#b0b0b8;border-right:1px solid #3a3a44;height:100%;display:flex;align-items:center}
.gperson{flex:1;padding:0 7px;font-size:11px;color:#e8e8ec;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:3px}
.gbadge{font-size:9px;padding:1px 5px;border-radius:4px;white-space:nowrap;flex-shrink:0;background:#1e1e26;color:#b0b0b8;border:1px solid #3a3a44}
.gtl{flex:1;position:relative;height:28px;min-height:28px}
.grow.done{opacity:.55}
.grow.done .gperson{text-decoration:line-through;color:#666}
.done-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:#3a3a3a;color:#888;border:1px solid #555;white-space:nowrap;flex-shrink:0}
.type-badge{font-size:9px;padding:1px 5px;border-radius:3px;color:#fff;white-space:nowrap;flex-shrink:0}
.hidden-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:#3a2a00;color:#aa8800;border:1px solid #5a4400;white-space:nowrap;flex-shrink:0}
/* 그리드/바 */
.gl{position:absolute;top:0;bottom:0;width:1px;pointer-events:none;z-index:1;background:#2a2a34}
.gl.mo{background:#3a3a44;width:1.5px}
.tlnb{position:absolute;top:0;bottom:0;width:2px;background:#ff5555;opacity:.5;z-index:8;pointer-events:none}
.bar{position:absolute;height:18px;top:5px;border-radius:3px;display:flex;align-items:center;cursor:pointer;z-index:6;box-shadow:0 1px 3px rgba(0,0,0,.3);overflow:visible}
.bar:hover{opacity:.82}
.bar-hq-done{background:#4a4a6a}.bar-hq-going{background:#2176cc}.bar-hq-plan{background:#0f9e6e}
.bar-out-done{background:#5a4a2a}.bar-out-going{background:#cc8010}.bar-out-plan{background:#8a6e00}
.barlbl{position:sticky;left:302px;display:inline-flex;align-items:center;font-size:10px;font-weight:500;color:#fff;white-space:nowrap;height:100%;pointer-events:none;z-index:7;padding:0 7px;text-shadow:0 1px 2px rgba(0,0,0,.5)}
/* 이벤트 */
.evln{position:absolute;top:0;bottom:0;width:2px;z-index:7;pointer-events:none}
.evchip{position:absolute;top:3px;font-size:9px;font-weight:500;padding:1px 5px;border-radius:3px;white-space:nowrap;cursor:pointer;z-index:9;color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3);overflow:hidden;text-overflow:ellipsis}
.empty{padding:40px;text-align:center;color:#666;font-size:13px}
/* 모달 */
.mover{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.65);backdrop-filter:blur(3px)}
.modal{background:#181820;border-radius:10px;border:1.5px solid #555;padding:20px 22px;width:460px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.5)}
.modal.wide{width:700px}
.mtit{font-size:14px;font-weight:500;margin-bottom:16px;color:#e8e8ec}
.fg{margin-bottom:12px}
.fl{font-size:11px;color:#b0b0b8;margin-bottom:4px;display:block;font-weight:500}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input[type=text],input[type=date],select{width:100%;padding:6px 9px;border:1px solid #3a3a44;border-radius:5px;font-size:12px;outline:none;background:#1e1e26;color:#e8e8ec}
input[type=text]:focus,input[type=date]:focus,select:focus{border-color:#1a6bbf}
.chkrow{display:flex;align-items:center;gap:7px;font-size:12px;color:#e8e8ec;padding:4px 0;cursor:pointer}
.chkrow input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:#534AB7}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid #3a3a44}
.dbox{padding:6px 10px;background:#1e1e26;border-radius:5px;font-size:12px;color:#b0b0b8;margin-bottom:12px;border:1px solid #3a3a44}
.crow{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.csw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s}
.csw.sel{border-color:#e8e8ec;transform:scale(1.2)}
/* 사이트 관리 모달 */
.sitemgr{display:grid;grid-template-columns:1fr 1fr;gap:0;height:500px;max-height:70vh}
.sitemgr-l{border-right:1px solid #3a3a44;padding-right:14px;overflow-y:auto;display:flex;flex-direction:column}
.sitemgr-r{padding-left:14px;overflow-y:auto}
.smtit{font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #2a2a34}
.mrow{display:flex;align-items:center;gap:5px;padding:4px 0;border-bottom:1px solid #1e1e26}
.mrow:last-child{border-bottom:none}
.dh{cursor:grab;color:#555;font-size:13px;padding:0 2px;user-select:none;flex-shrink:0}
.dover{border-top:2px solid #1a6bbf!important}
.grp-chip{font-size:9px;padding:1px 6px;border-radius:3px;white-space:nowrap;flex-shrink:0}
/* 날짜 선택기 */
.date-wrap{position:relative;width:100%;display:block}
.date-wrap input[type=date]{position:absolute;opacity:0;width:100%;height:100%;top:0;left:0;cursor:pointer;z-index:2}
.date-disp{width:100%;padding:6px 9px;border:1px solid #3a3a44;border-radius:5px;font-size:12px;background:#1e1e26;color:#e8e8ec;cursor:pointer;display:flex;align-items:center;gap:6px;position:relative;z-index:1}
.date-disp:hover{border-color:#1a6bbf}
.date-disp .cal-icon{color:#666;font-size:11px}

/* ── 사내규정 검색 패널 ── */
#policyPanel{flex:1;display:none;flex-direction:column;overflow:hidden;background:#18181e}
#policyPanel.active{display:flex}
.policy-topbar{flex-shrink:0;padding:10px 16px;background:#1e1e28;border-bottom:1px solid #3a3a44;display:flex;align-items:center;gap:10px}
.policy-search-wrap{flex:1;position:relative}
.policy-search-wrap input{width:100%;padding:7px 12px 7px 34px;background:#12121a;border:1px solid #3a3a44;border-radius:6px;color:#e8e8ec;font-size:13px;outline:none}
.policy-search-wrap input:focus{border-color:#1a6b3a}
.policy-search-wrap input::placeholder{color:#555}
.psrch-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;opacity:.5;pointer-events:none}
.policy-cats{flex-shrink:0;display:flex;gap:4px;padding:8px 16px;background:#1a1a22;border-bottom:1px solid #2a2a34;overflow-x:auto}
.pcat{padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid #3a3a44;cursor:pointer;white-space:nowrap;color:#888;background:transparent;transition:.15s}
.pcat.on{background:#1a6b3a;color:#fff;border-color:#1a6b3a}
.pcat:hover:not(.on){background:#252535;color:#ccc}
.policy-body{flex:1;overflow-y:auto;padding:12px 16px}
.policy-result-info{font-size:11px;color:#555;margin-bottom:10px}
.psec{background:#1e1e28;border:1px solid #2a2a34;border-radius:8px;margin-bottom:10px;overflow:hidden}
.psec-hd{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;user-select:none}
.psec-hd:hover{background:#252535}
.psec-icon{font-size:18px;flex-shrink:0}
.psec-meta{flex:1}
.psec-cat{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:#1a3a1a;color:#6acc6a;border:1px solid #2a5a2a;display:inline-block;margin-bottom:3px}
.psec-match{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;background:#3a3a00;color:#aaaa00;border:1px solid #5a5a00;display:inline-block;margin-bottom:3px;margin-left:4px}
.psec-title{font-size:13px;font-weight:600;color:#e8e8ec}
.psec-date{font-size:10px;color:#555;margin-top:2px}
.psec-arrow{color:#555;font-size:14px;transition:.2s;flex-shrink:0}
.psec-body{border-top:1px solid #2a2a34}
.pitem{padding:10px 14px;border-bottom:1px solid #1a1a22}
.pitem:last-child{border-bottom:none}
.pitem.highlight{background:#1a2a1a}
.pitem-sub{font-size:11px;font-weight:700;color:#6acc6a;margin-bottom:5px}
.pitem-txt{font-size:12px;color:#c8c8d0;line-height:1.75}
.pitem-txt mark{background:#3a4a00;color:#ccdd44;padding:0 2px;border-radius:2px}
.policy-empty{text-align:center;padding:60px 20px;color:#555}
.policy-empty .ico{font-size:36px;margin-bottom:10px}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <span class="ttl">출장 일정 관리</span>
    <div class="tright">
      <div class="leg" id="ganttLegend">
        <div class="legg">
          <span class="legl">본사계열</span>
          <div class="legi"><div class="legd" style="background:#4a4a6a"></div>완료</div>
          <div class="legi"><div class="legd" style="background:#2176cc"></div>출장중</div>
          <div class="legi"><div class="legd" style="background:#0f9e6e"></div>예정</div>
        </div>
        <div class="legs"></div>
        <div class="legg">
          <span class="legl">외주계열</span>
          <div class="legi"><div class="legd" style="background:#5a4a2a"></div>완료</div>
          <div class="legi"><div class="legd" style="background:#cc8010"></div>출장중</div>
          <div class="legi" style="border-right:none"><div class="legd" style="background:#8a6e00"></div>예정</div>
        </div>
      </div>
      <button class="btn" id="btnHidden" onclick="toggleShowHidden()">숨김 보기</button>
      <button class="btn" onclick="openModal('site')">사이트 관리</button>
      <button class="btn ev" onclick="openModal('event')">★ 이벤트 등록</button>
      <button class="btn pri" onclick="openModal('schedule')">+ 출장 등록</button>
      <button class="btn gsh" onclick="sheetsLoad()">🔄 Sheets 불러오기</button>
      <button class="btn gsh" onclick="sheetsSave()">☁ Sheets 저장</button>
      <button class="btn" onclick="openSheetsSettings()">⚙ Sheets 설정</button>
      <div style="width:1px;height:20px;background:#3a3a44"></div>
      <button class="btn policy-tab" id="btnPolicy" onclick="togglePolicy()">📋 사내규정</button>
    </div>
  </div>
  <div class="content">
    <div class="sidebar" id="ganttSidebar">
      <div class="sbhead"><span class="slbl">사이트 필터</span></div>
      <div class="sbody" id="siteList"></div>
    </div>
    <div class="main" id="ganttMain">
      <div class="gscroll" id="gscroll">
        <div class="gwrap" id="gwrap">
          <div class="ghrow">
            <div class="ghinner">
              <div class="ghfixed">
                <div class="ghc" style="width:68px;min-width:68px;max-width:68px">업무</div>
                <div class="ghc">출장자</div>
              </div>
              <div class="ghtl" id="ghTl"></div>
            </div>
            <div class="ghdb">
              <div class="ghdbf"></div>
              <div class="ghdbt" id="ghDb"></div>
            </div>
          </div>
          <div id="gbody"></div>
        </div>
      </div>
    </div>

    <!-- 사내규정 패널 -->
    <div id="policyPanel">
      <div class="policy-topbar">
        <span style="font-size:13px;font-weight:600;color:#6acc6a;white-space:nowrap">📋 사내규정</span>
        <div class="policy-search-wrap">
          <span class="psrch-icon">🔍</span>
          <input type="text" id="policyQuery" placeholder="검색어 입력 (예: 숙박비, 일비, 전결...)" oninput="renderPolicy()">
        </div>
        <button id="policyQueryClear" onclick="clearPQ()" style="background:none;border:none;color:#555;font-size:18px;cursor:pointer;padding:0 4px;display:none">×</button>
      </div>
      <div class="policy-cats" id="policyCats"></div>
      <div class="policy-body" id="policyBody"></div>
    </div>
  </div>
</div>
<div id="mc"></div>

<script>
/* ══════════════════════════════════════════
   사내규정 데이터
══════════════════════════════════════════ */
var PSECTIONS=[
  {id:"card",cat:"법인카드",icon:"💳",title:"법인카드 사용 및 관리 지침",updated:"2013.07.01",items:[
    {sub:"지급 대상",txt:"그룹장 이상 기준으로 지급. 공용카드(그룹내사용카드)는 그룹장 책임하에 그룹원에게 지급 가능."},
    {sub:"부여 한도",txt:"그룹장 이상: 최대 500만원 (대표이사 및 임원 예외). 그룹내 부서공용카드: 50만원~100만원 (그룹장 승인 필요)."},

var pCat='전체',pExpanded={};

function togglePolicy(){
  var panel=document.getElementById('policyPanel');
  var ganttSidebar=document.getElementById('ganttSidebar');
  var ganttMain=document.getElementById('ganttMain');
  var btn=document.getElementById('btnPolicy');
  var legend=document.getElementById('ganttLegend');
  var on=panel.classList.toggle('active');
  btn.classList.toggle('on',on);
  ganttSidebar.style.display=on?'none':'';
  ganttMain.style.display=on?'none':'';
  legend.style.display=on?'none':'';
  if(on){renderPolicyCats();renderPolicy();}
}

function renderPolicyCats(){
  var el=document.getElementById('policyCats');
  var cats=['전체'].concat(PSECTIONS.map(function(s){return s.cat;}));
  el.innerHTML=cats.map(function(c){
    return '<button class="pcat'+(c===pCat?' on':'')+'" onclick="setPCat(\''+c+'\')">'+c+'</button>';
  }).join('');
}

function setPCat(c){pCat=c;renderPolicyCats();renderPolicy();}

function clearPQ(){
  document.getElementById('policyQuery').value='';
  document.getElementById('policyQueryClear').style.display='none';
  renderPolicy();
}

function renderPolicy(){
  var q=(document.getElementById('policyQuery').value||'').trim().toLowerCase();
  var clr=document.getElementById('policyQueryClear');
  if(clr)clr.style.display=q?'block':'none';

  var results=PSECTIONS.filter(function(sec){
    var matchCat=pCat==='전체'||sec.cat===pCat;
    if(!q)return matchCat;
    var inTitle=sec.title.toLowerCase().indexOf(q)>=0;
    var inItems=sec.items.some(function(it){
      return it.sub.toLowerCase().indexOf(q)>=0||it.txt.toLowerCase().indexOf(q)>=0;
    });
    return matchCat&&(inTitle||inItems);
  }).map(function(sec){
    if(!q)return {sec:sec,matched:null};
    var matched=sec.items.filter(function(it){
      return it.sub.toLowerCase().indexOf(q)>=0||it.txt.toLowerCase().indexOf(q)>=0;
    });
    return {sec:sec,matched:matched.length?matched:null};
  });

  var body=document.getElementById('policyBody');
  var info=document.getElementById('policyBody');

  var html='<div class="policy-result-info">'+(q?'\''+q+'\' 검색 결과 '+results.length+'건':'전체 '+results.length+'개 규정')+'</div>';

  if(!results.length){
    html+='<div class="policy-empty"><div class="ico">🔍</div><div style="font-size:14px;font-weight:600;margin-bottom:6px;color:#888">검색 결과가 없습니다</div><div style="font-size:12px">다른 키워드로 검색해 보세요</div></div>';
    body.innerHTML=html;return;
  }

  results.forEach(function(r){
    var sec=r.sec;
    var isOpen=q?true:(pExpanded[sec.id]!==false&&pExpanded[sec.id]);
    var itemsToShow=r.matched||sec.items;
    html+='<div class="psec" id="psec_'+sec.id+'">';
    html+='<div class="psec-hd" onclick="togglePSec(\''+sec.id+'\')">';
    html+='<span class="psec-icon">'+sec.icon+'</span>';
    html+='<div class="psec-meta">';
    html+='<div><span class="psec-cat">'+sec.cat+'</span>';
    if(r.matched)html+='<span class="psec-match">'+r.matched.length+'건 일치</span>';
    html+='</div>';
    html+='<div class="psec-title">'+sec.title+'</div>';
    html+='<div class="psec-date">최종 개정: '+sec.updated+'</div>';
    html+='</div>';
    html+='<span class="psec-arrow" id="parr_'+sec.id+'" style="transform:'+(isOpen?'rotate(180deg)':'rotate(0deg)')+'">⌄</span>';
    html+='</div>';
    if(isOpen){
      html+='<div class="psec-body" id="pbody_'+sec.id+'">';
      itemsToShow.forEach(function(item){
        var isHl=q&&(item.sub.toLowerCase().indexOf(q)>=0||item.txt.toLowerCase().indexOf(q)>=0);
        html+='<div class="pitem'+(isHl?' highlight':'')+'">';
        html+='<div class="pitem-sub">'+hlTxt(item.sub,q)+'</div>';
        html+='<div class="pitem-txt">'+hlTxt(item.txt,q)+'</div>';
        html+='</div>';
      });
      html+='</div>';
    }
    html+='</div>';
  });

  body.innerHTML=html;
}

function hlTxt(text,q){
  // XSS 방지
  var s=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  if(!q)return s;
  var re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return s.replace(re,'<mark>$1</mark>');
}

function togglePSec(id){
  pExpanded[id]=!pExpanded[id];
  var body=document.getElementById('pbody_'+id);
  var arr=document.getElementById('parr_'+id);
  if(body){body.style.display=pExpanded[id]?'block':'none';}
  else{
    // 없으면 새로 생성
    renderPolicy();return;
  }
  if(arr)arr.style.transform=pExpanded[id]?'rotate(180deg)':'rotate(0deg)';
}

var TODAY=(function(){var d=new Date();d.setHours(0,0,0,0);return d;})();
function pd(s){var d=new Date(s);d.setHours(0,0,0,0);return d;}
function normDate(s){if(!s)return '';if(/^\d{4}-\d{2}-\d{2}$/.test(String(s).trim()))return String(s).trim();var d=new Date(s);if(isNaN(d.getTime()))return s;return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function dd(a,b){return Math.round((pd(b)-pd(a))/86400000)+1;}
function fmt(s){var d=pd(s);return String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');}
function fmtFull(s){if(!s)return '';var d=pd(s);return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');}

function barCls(sc){var s=pd(sc.start),e=pd(sc.end);var isHq=(sc.type==='hq'||sc.type==='tech'||sc.type==='vision'||sc.type==='host');if(TODAY>e)return isHq?'bar-hq-done':'bar-out-done';if(TODAY>=s)return isHq?'bar-hq-going':'bar-out-going';return isHq?'bar-hq-plan':'bar-out-plan';}
var WPX=42,_months=[],_totPx=0,_sd=null;
function calcRange(){var minD=new Date(TODAY.getFullYear(),TODAY.getMonth()-1,1),maxD=new Date(TODAY.getFullYear(),TODAY.getMonth()+3,0);var all=[];S.schedules.forEach(function(s){all.push(s.start);all.push(s.end);});S.events.forEach(function(e){all.push(e.date);});if(all.length){var sorted=all.map(function(d){return pd(d);}).sort(function(a,b){return a-b;});if(sorted[0]<minD)minD=new Date(sorted[0].getFullYear(),sorted[0].getMonth(),1);var mx=sorted[sorted.length-1];var mxE=new Date(mx.getFullYear(),mx.getMonth()+2,0);if(mxE>maxD)maxD=mxE;}return{start:minD,end:maxD};}
function initTL(){var r=calcRange();_sd=new Date(r.start);_sd.setHours(0,0,0,0);_months=[];var cur=new Date(r.start.getFullYear(),r.start.getMonth(),1);while(cur<=r.end){var y=cur.getFullYear(),m=cur.getMonth()+1,days=new Date(y,m,0).getDate();_months.push({y:y,m:m,days:days,weeks:Math.ceil(days/7),label:(m===1?y+'년 ':'')+m+'월'});cur=new Date(y,m,1);}_totPx=Math.round(_months.reduce(function(s,m){return s+m.days;},0)/7*WPX);}

function tpx(){var y=TODAY.getFullYear(),m=String(TODAY.getMonth()+1).padStart(2,'0'),d=String(TODAY.getDate()).padStart(2,'0');return d2px(y+'-'+m+'-'+d);}
function mPx(mon){return Math.round(mon.days/7*WPX);}
function wPx(mon,wi){var s=wi*7+1,e=Math.min(s+6,mon.days);return Math.round((e-s+1)/7*WPX);}

function addEv(el,evts,chips){evts.forEach(function(evt){var col=EVC.find(function(c){return c.id===evt.colorId;})||EVC[0];var px=d2px(evt.date);var ln=document.createElement('div');ln.className='evln';ln.style.cssText='left:'+px+'px;background:'+col.bg+';opacity:'+(chips?'.9':'.25');el.appendChild(ln);if(!chips)return;var ch=document.createElement('div');ch.className='evchip';ch.style.cssText='left:'+(px+3)+'px;background:'+col.bg;ch.setAttribute('data-px',px);ch.title=fmt(evt.date)+' '+evt.title;ch.textContent=fmt(evt.date)+' '+evt.title;ch.onclick=(function(id){return function(){openEditEv(id);};})(evt.id);el.appendChild(ch);});if(chips){var chipEls=Array.prototype.slice.call(el.querySelectorAll('.evchip')).sort(function(a,b){return parseInt(a.getAttribute('data-px'))-parseInt(b.getAttribute('data-px'));});for(var i=0;i<chipEls.length-1;i++){var cur=chipEls[i],next=chipEls[i+1];var curPx=parseInt(cur.getAttribute('data-px'));var nextPx=parseInt(next.getAttribute('data-px'));var gap=nextPx-curPx;if(gap<80){cur.style.maxWidth=Math.max(gap-6,20)+'px';cur.style.overflow='hidden';cur.style.textOverflow='ellipsis';}}}}

function renderGantt(){var body=document.getElementById('gbody');body.innerHTML='';var siteOrder={};S.sites.forEach(function(s,i){siteOrder[s.id]=i;});var projs=S.projects.filter(function(p){if(S.filterSite!=='all'&&p.siteId!==S.filterSite)return false;var hasVisible=S.schedules.some(function(s){return s.projectId===p.id&&(!s.hidden||S.showHidden);});var hasEvent=S.events.some(function(e){return e.projectId===p.id;});return hasVisible||hasEvent;}).sort(function(a,b){return (siteOrder[a.siteId]||0)-(siteOrder[b.siteId]||0);});if(!projs.length){body.innerHTML='<div class="empty">등록된 출장 일정이 없습니다.</div>';return;}var ri=0;projs.forEach(function(proj){var site=S.sites.find(function(s){return s.id===proj.siteId;});var sc=site?site.color:'#666';var scheds=S.schedules.filter(function(s){return s.projectId===proj.id&&(!s.hidden||S.showHidden);});var evts=S.events.filter(function(e){return e.projectId===proj.id;});var grp=document.createElement('div');grp.className='grprow';var gf=document.createElement('div');gf.className='grpfix';gf.innerHTML='<span class="grpbadge" style="background:'+sc+'">'+(site?site.name:proj.siteId)+'</span><span class="grpname">'+proj.name+'</span>';grp.appendChild(gf);grp.appendChild(makeTL(26,'grptl',evts,false));body.appendChild(grp);if(evts.length){var er=document.createElement('div');er.className='evrow';var ef=document.createElement('div');ef.className='evfix';ef.textContent='★ 주요 이벤트';er.appendChild(ef);er.appendChild(makeTL(22,'evtl',evts,true));body.appendChild(er);}var tasks=[];scheds.forEach(function(s){if(tasks.indexOf(s.task)<0)tasks.push(s.task);});tasks.forEach(function(task){scheds.filter(function(s){return s.task===task;}).forEach(function(sched,idx){var days=dd(sched.start,sched.end),dr=fmt(sched.start)+'~'+fmt(sched.end);var isDone=TODAY>pd(sched.end);var isEven=(ri%2===0);ri++;var row=document.createElement('div');row.className='grow '+(isEven?'even':'odd')+(isDone?' done':'')+(sched.hidden?' hidden-row':'');var gf2=document.create function showEM(ex){var ie=!!ex;_selCol=ie?(ex.colorId||'purple'):'purple';var html='<div class="mtit">'+(ie?'이벤트 수정':'중요 이벤트 등록')+'</div>';var po=S.projects.map(function(p){var si=S.sites.find(function(s){return s.id===p.siteId;});return '<option value="'+p.id+'"'+(ie&&ex.projectId===p.id?' selected':'')+'>'+(si?si.name:'?')+' - '+p.name+'</option>';}).join('');var sw=EVC.map(function(c){return '<div class="csw'+(c.id===_selCol?' sel':'')+'" style="background:'+c.bg+'" data-cid="'+c.id+'" id="sw_'+c.id+'"></div>';}).join('');html+='<div class="fg"><label class="fl">사이트/프로젝트</label><select id="fe_proj">'+po+'</select></div>';html+='<div class="fg"><label class="fl">날짜</label><input type="date" id="fe_date" value="'+(ie?ex.date:'2026-04-06')+'"></div>';html+='<div class="fg"><label class="fl">이벤트 제목</label><input type="text" id="fe_title" value="'+(ie?ex.title:'')+'" placeholder="예: 양산시작"></div>';html+='<div class="fg"><label class="fl">색상</label><div class="crow">'+sw+'</div></div>';html+='<div class="mfoot">';if(ie)html+='<button class="btn red sm" id="fe_del">삭제</button>';html+='<button class="btn sm" id="fe_cancel">취소</button>';html+='<button class="btn sm pri" id="fe_save">'+(ie?'수정 완료':'등록')+'</button>';html+='</div>';mw(html);document.querySelectorAll('.csw').forEach(function(btn){btn.addEventListener('click',function(){selC(this.getAttribute('data-cid'));});});document.getElementById('fe_cancel').onclick=function(){cm();};document.getElementById('fe_save').onclick=function(){saveEv(ie?ex.id:null);};if(ie)document.getElementById('fe_del').onclick=function(){delEv(ex.id);};}
function selC(id){_selCol=id;document.querySelectorAll('.csw').forEach(function(e){e.classList.toggle('sel',e.id==='sw_'+id);});}
function saveEv(exId){var projId=document.getElementById('fe_proj').value;var date=document.getElementById('fe_date').value;var title=document.getElementById('fe_title').value.trim();if(!projId||!date||!title){alert('모든 항목을 입력하세요.');return;}if(exId){var i=S.events.findIndex(function(e){return e.id===exId;});S.events[i]={id:exId,projectId:projId,date:date,title:title,colorId:_selCol};}else{S.events.push({id:'e'+Date.now(),projectId:projId,date:date,title:title,colorId:_selCol});}saveData();cm();renderAll();}
function delEv(id){if(!confirm('이벤트를 삭제할까요?'))return;S.events=S.events.filter(function(e){return e.id!==id;});saveData();cm();renderAll();}
function showSM(ex){var ie=!!ex;var so=S.sites.map(function(s){return '<option value="'+s.id+'">'+s.name+'</option>';}).join('');var po='<option value="">사이트를 먼저 선택하세요</option>';if(ie){var pr=S.projects.find(function(p){return p.id===ex.projectId;});if(pr)po=S.projects.filter(function(p){return p.siteId===pr.siteId;}).map(function(p){return '<option value="'+p.id+'"'+(p.id===ex.projectId?' selected':'')+'>'+p.name+'</option>';}).join('');}var curType=ie?(ex.type||'hq'):'hq';var typeOpts=[['hq','본사'],['outsource','외주'],['tech','기술'],['vision','비전'],['host','호스트']].map(function(t){return '<option value="'+t[0]+'"'+(curType===t[0]?' selected':'')+'>'+t[1]+'</option>';}).join('');var days=ie?dd(ex.start,ex.end)+' 일':'-';var dateInfo=ie?(fmtFull(ex.start)+' → '+fmtFull(ex.end)):'';var isHidden=ie&&ex.hidden?true:false;var html='<div class="mtit">'+(ie?'출장 일정 수정':'출장 일정 등록')+'</div>';html+='<div class="fg"><label class="fl">사이트</label><select id="f_site">'+so+'</select></div>';html+='<div class="fg"><label class="fl">프로젝트</label><select id="f_proj">'+po+'</select></div>';html+='<div class="fg"><label class="fl">업무 유형</label><input type="text" id="f_task" value="'+(ie?ex.task:'')+'" placeholder="예: 셋업, 대응, 개조"></div>';html+='<div class="fg"><label class="fl">출장자 이름</label><input type="text" id="f_name" value="'+(ie?ex.name:'')+'" placeholder="이름 입력"></div>';html+='<div class="fg"><label class="fl">인원 구분</label><select id="f_type">'+typeOpts+'</select></div>';html+='<div class="fr"><div class="fg"><label class="fl">출발일 (YYYY-MM-DD)</label><input type="text" id="f_start" value="'+(ie?ex.start:'2026-03-01')+'" placeholder="2026-04-01" maxlength="10" oninput="fmtDateInput(this);calcD()" style="font-family:monospace;letter-spacing:1px"></div><div class="fg"><label class="fl">복귀일 (YYYY-MM-DD)</label><input type="text" id="f_end" value="'+(ie?ex.end:'2026-03-30')+'" placeholder="2026-06-30" maxlength="10" oninput="fmtDateInput(this);calcD()" style="font-family:monospace;letter-spacing:1px"></div></div>';html+='<div class="dbox"><span id="f_datebox" style="color:#ccc">'+dateInfo+'</span>'+(dateInfo?' &nbsp; ':'')+'체류: <span id="f_days" style="font-weight:500">'+days+'</span></div>';html+='<div class="fg"><label class="fl">메모 / 비고</label><input type="text" id="f_note" value="'+(ie?ex.note:'')+'" placeholder="주의사항 등"></div>';html+='<label class="chkrow"><input type="checkbox" id="f_hidden"'+(isHidden?' checked':'')+'>간트차트에서 숨기기</label>';html+='<div class="mfoot">';if(ie)html+='<button class="btn red sm" id="f_del">삭제</button>';html+='<button class="btn sm" id="f_cancel">취소</button>';html+='<button class="btn sm pri" id="f_save">'+(ie?'수정 완료':'등록')+'</button>';html+='</div>';mw(html);document.getElementById('f_site').onchange=function(){upP();};document.getElementById('f_start').onchange=function(){calcD();};document.getElementById('f_end').onchange=function(){calcD();};document.getElementById('f_cancel').onclick=function(){cm();};document.getElementById('f_save').onclick=function(){saveSc(ie?ex.id:null);};if(ie){document.getElementById('f_del').onclick=function(){delSc(ex.id);};var pr2=S.projects.find(function(p){return p.id===ex.projectId;});if(pr2)document.getElementById('f_site').value=pr2.siteId;upP();setTimeout(function(){document.getElementById('f_proj').value=ex.projectId;calcD();},0);}else{upP();calcD();}}
function upP(){var sid=document.getElementById('f_site').value;var ps=S.projects.filter(function(p){return p.siteId===sid;});document.getElementById('f_proj').innerHTML=ps.length?ps.map(function(p){return '<option value="'+p.id+'">'+p.name+'</option>';}).join(''):'<option value="">해당 사이트에 프로젝트 없음</option>';}
function fmtDateInput(el){var v=el.value.replace(/[^0-9]/g,'');if(v.length>4)v=v.slice(0,4)+'-'+v.slice(4);if(v.length>7)v=v.slice(0,7)+'-'+v.slice(7);el.value=v.slice(0,10);}
function calcD(){var s=document.getElementById('f_start').value;var e=document.getElementById('f_end').value;var re=/^\d{4}-\d{2}-\d{2}$/;var fs=document.getElementById('f_start');var fe=document.getElementById('f_end');if(fs)fs.style.borderColor=(!s||re.test(s))?'#3a3a44':'#b52020';if(fe)fe.style.borderColor=(!e||re.test(e))?'#3a3a44':'#b52020';if(s&&e&&re.test(s)&&re.test(e)){if(s<=e){document.getElementById('f_days').textContent=dd(s,e)+' 일';var db=document.getElementById('f_datebox');if(db)db.textContent=fmtFull(s)+' → '+fmtFull(e);if(fe)fe.style.borderColor='#3a3a44';}else{if(fe)fe.style.borderColor='#b52020';document.getElementById('f_days').textContent='날짜 오류';}}}
function saveSc(exId){var projId=document.getElementById('f_proj').value;var task=document.getElementById('f_task').value.trim();var name=document.getElementById('f_name').value.trim();var type=document.getElementById('f_type').value;var start=document.getElementById('f_start').value;var end=document.getElementById('f_end').value;var note=document.getElementById('f_note').value.trim();var hidden=document.getElementById('f_hidden').checked;var dateRe=/^\d{4}-\d{2}-\d{2}$/;if(!projId||!task||!name||!start||!end){alert('필수 항목을 모두 입력하세요.');return;}if(!dateRe.test(start)||!dateRe.test(end)){alert('날짜 형식이 올바르지 않아요.\n예: 2026-04-01');return;}if(start>end){alert('복귀일이 출발일보다 빠릅니다.');return;}if(exId){var i=S.schedules.findIndex(function(s){return s.id===exId;});S.schedules[i]={id:exId,projectId:projId,task:task,name:name,type:type,start:start,end:end,note:note,hidden:hidden};}else{S.schedules.push({id:'s'+Date.now(),projectId:projId,task:task,name:name,type:type,start:start,end:end,note:note,hidden:hidden});}saveData();cm();renderAll();}
function delSc(id){if(!confirm('이 출장 일정을 삭제할까요?'))return;S.schedules=S.schedules.filter(function(s){return s.id!==id;});saveData();cm();renderAll();}
function showSiteM(){mw('<div class="mtit">사이트 / 프로젝트 관리</div>'+'<div class="sitemgr">'+'<div class="sitemgr-l"><div class="smtit">그룹 & 사이트</div><div id="grpSiteRows"></div>'+'<div style="margin-top:10px;padding-top:8px;border-top:1px solid #2a2a34">'+'<div style="font-size:10px;color:#666;margin-bottom:5px">새 그룹 추가</div>'+'<div style="display:flex;gap:5px"><input type="text" id="ns_grp" placeholder="그룹명" style="flex:1"><button class="btn sm pri" onclick="addGroup()">추가</button></div>'+'<div style="font-size:10px;color:#666;margin:8px 0 5px">새 사이트 추가</div>'+'<div style="display:flex;gap:5px;margin-bottom:4px"><input type="text" id="ns_n" placeholder="사이트명" style="flex:1"><input type="color" id="ns_c" value="#1558a0" style="width:30px;padding:1px;border:1px solid #3a3a44;border-radius:4px;background:#1e1e26"></div>'+'<div style="display:flex;gap:5px"><select id="ns_grpsel" style="flex:1">'+S.groups.map(function(g){return '<option value="'+g.id+'">'+g.name+'</option>';}).join('')+'</select><button class="btn sm pri" onclick="addSite()">추가</button></div>'+'</div></div>'+'<div class="sitemgr-r"><div class="smtit">프로젝트</div><div id="projRows"></div></div>'+'</div>'+'<div class="mfoot"><button class="btn sm" onclick="cm()">닫기</button></div>',true);buildGrpSiteRows();buildProjRows();}
function buildGrpSiteRows(){var el=document.getElementById('grpSiteRows');if(!el)return;el.innerHTML='';S.groups.forEach(function(grp){var gh=document.createElement('div');gh.style.cssText='display:flex;align-items:center;gap:5px;padding:5px 0 3px;border-bottom:1px solid #3a3a44;margin-bottom:3px';var ni=document.createElement('input');ni.type='text';ni.value=grp.name;ni.style.cssText='flex:1;font-size:11px;font-weight:600;color:#ccc;padding:2px 5px';ni.onchange=(function(gid){return function(){updGN(gid,this.value);};})(grp.id);var db=document.createElement('button');db.className='btn sm red';db.textContent='그룹삭제';db.onclick=(function(gid){return function(){delGroup(gid);};})(grp.id);gh.appendChild(ni);gh.appendChild(db);el.appendChild(gh);var grpSites=S.sites.filter(function(s){return (s.groupId||'_none')===grp.id;});grpSites.forEach(function(site,si){var row=document.createElement('div');row.className='mrow';row.style.paddingLeft='8px';row.draggable=true;var ic=document.createElement('input');ic.type='color';ic.value=site.color;ic.style.cssText='width:22px;height:22px;padding:0;border:none;background:none;cursor:pointer;flex-shrink:0';ic.onchange=(function(sid){return function(){updSC(sid,this.value);};})(site.id);var iname=document.createElement('input');iname.type='text';iname.value=site.name;iname.style.cssText='flex:1;min-width:60px;font-size:11px';iname.onchange=(function(sid){return function(){updSN(sid,this.value);};})(site.id);var gsel=document.createElement('select');gsel.style.cssText='font-size:10px;padding:2px 3px;max-width:80px';S.groups.forEach(function(g){var o=document.createElement('option');o.value=g.id;o.textContent=g.name;if(g.id===grp.id)o.selected=true;gsel.appendChild(o);});gsel.onchange=(function(sid){return function(){moveSiteGroup(sid,this.value);};})(site.id);var btnP=document.createElement('button');btnP.className='btn sm';btnP.textContent='PJT+';btnP.onclick=(function(sid){return function(){addP(sid);};})(site.id);var btnD=document.createElement('button');btnD.className='btn sm red';btnD.textContent='삭제';btnD.onclick=(function(sid){return function(){delSite(sid);};})(site.id);(function(siteId,siteIdx){row.ondragstart=function(e){e.dataTransfer.effectAllowed='move';_dragIdx=siteIdx;};row.ondragover=function(e){e.preventDefault();row.classList.add('dover');};row.ondragleave=function(){row.classList.remove('dover');};row.ondrop=function(e){e.preventDefault();row.classList.remove('dover');if(_dragIdx===null||_dragIdx===siteIdx){_dragIdx=null;return;}var from=_dragIdx,to=siteIdx;_dragIdx=null;var moved=S.sites.splice(from,1)[0];S.sites.splice(to,0,moved);saveData();buildGrpSiteRows();renderAll();};})(site.id,S.sites.indexOf(site));[ic,iname,gsel,btnP,btnD].forEach(function(el2){row.appendChild(el2);});el.appendChild(row);});if(!grpSites.length){var empty=document.createElement('div');empty.style.cssText='font-size:10px;color:#555;padding:3px 8px';empty.textContent='(사이트 없음)';el.appendChild(empty);}var gap=document.createElement('div');gap.style.height='8px';el.appendChild(gap);});}
function buildProjRows(){var el=document.getElementById('projRows');if(!el)return;el.innerHTML='';S.projects.forEach(function(p){var si=S.sites.find(function(s){return s.id===p.siteId;});var row=document.createElement('div');row.className='mrow';var chip=document.createElement('span');chip.className='grp-chip';chip.style.cssText='background:'+(si?si.color:'#555')+';color:#fff';chip.textContent=si?si.name:p.siteId;var ni=document.createElement('input');ni.type='text';ni.value=p.name;ni.style.cssText='flex:1;min-width:80px;font-size:11px';ni.onchange=(function(pid){return function(){updPN(pid,this.value);};})(p.id);var btnD=document.createElement('button');btnD.className='btn sm red';btnD.textContent='삭제';btnD.onclick=(function(pid){return function(){delPjt(pid);};})(p.id);[chip,ni,btnD].forEach(function(el2){row.appendChild(el2);});el.appendChild(row);});}
function addGroup(){var name=document.getElementById('ns_grp').value.trim();if(!name){alert('그룹명을 입력하세요.');return;}var id='g'+Date.now();S.groups.push({id:id,name:name});saveData();showSiteM();renderAll();}
function delGroup(id){if(!confirm('그룹을 삭제하면 소속 사이트가 미분류됩니다. 계속할까요?'))return;S.sites.forEach(function(s){if(s.groupId===id)s.groupId='_none';});S.groups=S.groups.filter(function(g){return g.id!==id;});saveData();showSiteM();renderAll();}
function updGN(id,v){var g=S.groups.find(function(g){return g.id===id;});if(g){g.name=v.trim();saveData();renderSidebar();}}
function moveSiteGroup(sid,gid){var s=S.sites.find(function(s){return s.id===sid;});if(s){s.groupId=gid;saveData();buildGrpSiteRows();renderSidebar();renderGantt();}}
function updSN(id,v){var s=S.sites.find(function(s){return s.id===id;});if(s){s.name=v.trim();saveData();renderSidebar();renderGantt();}}
function updSC(id,v){var s=S.sites.find(function(s){return s.id===id;});if(s){s.color=v;saveData();renderSidebar();renderGantt();}}
function addSite(){var name=document.getElementById('ns_n').value.trim(),color=document.getElementById('ns_c').value;var gid=document.getElementById('ns_grpsel').value;if(!name){alert('사이트 이름을 입력하세요.');return;}var baseId=name.replace(/[^a-zA-Z0-9가-힣]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'')||'site';var newId=baseId,n=2;while(S.sites.find(function(s){return s.id===newId;}))newId=baseId+'_'+n++;S.sites.push({id:newId,name:name,color:color,groupId:gid});saveData();showSiteM();renderAll();}
function delSite(id){if(!confirm('사이트와 관련 항목을 모두 삭제합니까?'))return;var pids=S.projects.filter(function(p){return p.siteId===id;}).map(function(p){return p.id;});S.projects=S.projects.filter(function(p){return p.siteId!==id;});S.schedules=S.schedules.filter(function(s){return pids.indexOf(s.projectId)<0;});S.events=S.events.filter(function(e){return pids.indexOf(e.projectId)<0;});S.sites=S.sites.filter(function(s){return s.id!==id;});saveData();showSiteM();renderAll();}
function updPN(id,v){var p=S.projects.find(function(p){return p.id===id;});if(p){p.name=v.trim();saveData();renderGantt();}}
function addP(sid){var name=prompt('새 프로젝트 이름:');if(!name)return;var baseId=name.replace(/[^a-zA-Z0-9가-힣]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'')||'pjt';var newId=baseId,n=2;while(S.projects.find(function(p){return p.id===newId;}))newId=baseId+'_'+n++;S.projects.push({id:newId,siteId:sid,name:name});saveData();showSiteM();renderAll();}
function delPjt(id){if(!confirm('프로젝트와 관련 일정을 모두 삭제합니까?'))return;S.schedules=S.schedules.filter(function(s){return s.projectId!==id;});S.events=S.events.filter(function(e){return e.projectId!==id;});S.projects=S.projects.filter(function(p){return p.id!==id;});saveData();showSiteM();renderAll();}

/* 시작 */
loadData();
renderAll();
(function(){var url=getSheetsUrl();if(!url||location.protocol==='file:')return;try{var raw=localStorage.getItem(LS);if(raw){var d=JSON.parse(raw);if(d&&Array.isArray(d.sites)&&d.sites.length>0)return;}}catch(e){}var ind=showInd('최신 데이터를 불러오는 중...');fetch(url+'?action=load').then(function(r){if(!r.ok)throw new Error('HTTP '+r.status);return r.json();}).then(function(data){hideInd(ind);if(data.error)throw new Error(data.error);if(data.groups&&data.groups.length)S.groups=data.groups;if(data.sites&&data.sites.length){var oldSites=S.sites;S.sites=data.sites.map(function(ns){var old=oldSites.find(function(os){return os.id===ns.id;});if(!ns.groupId&&old&&old.groupId)ns.groupId=old.groupId;return ns;});}if(data.projects&&data.projects.length)S.projects=data.projects;if(data.schedules&&data.schedules.length){S.schedules=data.schedules.map(function(sc){sc.start=normDate(sc.start);sc.end=normDate(sc.end);return sc;});}if(data.events)S.events=data.events;saveData();renderAll();}).catch(function(err){hideInd(ind);console.warn('자동 불러오기 실패:',err.message);});})();
</script>
