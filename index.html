*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#18181e}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;color:#e8e8ec}
.app{position:fixed;inset:0;display:flex;flex-direction:column;background:#18181e}
.topbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1.5px solid #555;background:#20202e;flex-wrap:wrap;gap:6px}
.ttl{font-size:14px;font-weight:600;color:#e8e8ec;white-space:nowrap}
.tright{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.btn{padding:4px 11px;font-size:11px;border:1px solid #555;border-radius:5px;cursor:pointer;background:transparent;color:#e8e8ec;transition:background .15s}
.btn:hover{background:#1e1e26}
.btn.pri{background:#1a6bbf;color:#fff;border-color:#155299}.btn.pri:hover{background:#155299}
.btn.ev{background:#534AB7;color:#fff;border-color:#3C3489}.btn.ev:hover{background:#3C3489}
.btn.gsh{background:#1a6b3a;color:#fff;border-color:#0f4a28}.btn.gsh:hover{background:#0f4a28}
.btn.sm{padding:2px 8px;font-size:11px}
.btn.red{background:#b52020;color:#fff;border-color:#7a1010}
.leg{display:flex;align-items:center;border:1px solid #3a3a44;border-radius:5px;overflow:hidden}
.legg{display:flex;align-items:center}
.legl{font-size:10px;color:#666;padding:0 6px;border-right:1px solid #3a3a44;white-space:nowrap;line-height:26px}
.legi{display:flex;align-items:center;gap:3px;padding:3px 7px;border-right:1px solid #3a3a44;font-size:10px;color:#b0b0b8}
.legi:last-child{border-right:none}
.legd{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.legs{width:1.5px;background:#555;align-self:stretch}
.content{display:flex;flex:1;min-height:0;overflow:hidden}
.sidebar{width:178px;min-width:178px;flex-shrink:0;border-right:1.5px solid #555;background:#1e1e28;padding:10px;overflow-y:auto}
.slbl{font-size:10px;font-weight:500;color:#666;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.slist{display:flex;flex-direction:column;gap:2px}
.sit{display:flex;align-items:center;padding:4px 7px;border-radius:5px;cursor:pointer;border:1px solid transparent}
.sit:hover{background:#1e1e26}.sit.on{background:#1e1e26;border-color:#3a3a44}
.sdot{width:8px;height:8px;border-radius:50%;margin-right:6px;flex-shrink:0}
.sname{flex:1;font-size:12px;color:#e8e8ec}
.scnt{font-size:10px;padding:1px 5px;border-radius:7px;background:#1e1e26;color:#b0b0b8;border:1px solid #3a3a44}
.main{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.gscroll{flex:1;overflow:auto}
.gwrap{display:inline-block;min-width:100%}
.ghrow{display:flex;flex-direction:column;position:sticky;top:0;z-index:30;border-bottom:2px solid #555;background:#1a1a28}
.ghinner{display:flex}
.ghfixed{width:300px;min-width:300px;flex-shrink:0;display:flex;border-right:2px solid #555;position:sticky;left:0;z-index:35;background:#1a1a28}
.ghc{flex:1;padding:4px 8px;font-size:11px;font-weight:500;color:#b0b0b8;border-right:1px solid #3a3a44}
.ghc:last-child{border-right:none}
.ghtl{display:flex;flex:1}
.ghmb{display:flex;flex-direction:column;border-right:1.5px solid #555;flex-shrink:0}
.ghmn{padding:3px 8px;font-size:11px;font-weight:500;color:#e8e8ec;border-bottom:1px solid #3a3a44;background:#1a1a28;white-space:nowrap}
.ghwks{display:flex}
.ghwk{font-size:10px;color:#666;padding:2px 0;border-right:1px solid #2a2a34;text-align:center;white-space:nowrap;flex-shrink:0;background:#20202e}
.ghdb{display:flex;height:17px;border-top:1px solid #3a3a44;background:#20202e}
.ghdbf{width:300px;min-width:300px;flex-shrink:0;border-right:2px solid #555;position:sticky;left:0;z-index:35;background:#20202e}
.ghdbt{flex:1;position:relative;height:17px}
.tdln{position:absolute;top:0;bottom:0;width:2px;background:#ff5555;opacity:.9;z-index:9;pointer-events:none}
.tdlb{position:absolute;top:1px;font-size:9px;font-weight:600;color:#ff5555;white-space:nowrap;z-index:10;padding:0 3px;border-radius:2px;background:#20202e;border:1px solid #ff5555}
.grprow{display:flex;align-items:stretch;border-top:2px solid #555;border-bottom:1px solid #3a3a44}
.grpfix{width:300px;min-width:300px;flex-shrink:0;padding:5px 10px;display:flex;align-items:center;gap:6px;border-right:2px solid #555;background:#222230;position:sticky;left:0;z-index:20}
.grpbadge{font-size:10px;font-weight:500;padding:2px 7px;border-radius:7px;color:#fff;white-space:nowrap;flex-shrink:0}
.grpname{font-size:12px;font-weight:500;color:#e8e8ec}
.evrow{display:flex;align-items:stretch;border-bottom:1px solid #3a3a44}
.evfix{width:300px;min-width:300px;flex-shrink:0;border-right:2px solid #555;display:flex;align-items:center;padding:0 10px;font-size:10px;font-weight:500;color:#b0b0b8;position:sticky;left:0;z-index:20;background:#1e1e28}
.evtl{flex:1;position:relative;height:22px;background:#181820}
.grow{display:flex;align-items:stretch;border-bottom:1px solid #2a2a34}
.grow.even{background:#1c1c24}.grow.odd{background:#181820}
.grow:hover{background:#1e2a3a!important}.grow:hover .gfix{background:#1e2a3a!important}
.gfix{width:300px;min-width:300px;flex-shrink:0;display:flex;border-right:2px solid #555;align-items:center;position:sticky;left:0;z-index:20}
.grow.even .gfix{background:#1c1c24}.grow.odd .gfix{background:#181820}
.gtask{width:68px;min-width:68px;padding:0 7px;font-size:11px;color:#b0b0b8;border-right:1px solid #3a3a44;height:100%;display:flex;align-items:center}
.gperson{flex:1;padding:0 7px;font-size:11px;color:#e8e8ec;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:3px}
.gbadge{font-size:9px;padding:1px 5px;border-radius:4px;white-space:nowrap;flex-shrink:0;background:#1e1e26;color:#b0b0b8;border:1px solid #3a3a44}
.gtl{flex:1;position:relative;height:28px;min-height:28px}
.grow.done{opacity:.55}
.grow.done .gperson{text-decoration:line-through;color:#666}
.done-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:#3a3a3a;color:#888;border:1px solid #555;white-space:nowrap;flex-shrink:0}
.type-badge{font-size:9px;padding:1px 5px;border-radius:3px;color:#fff;white-space:nowrap;flex-shrink:0}
.gl{position:absolute;top:0;bottom:0;width:1px;pointer-events:none;z-index:1;background:#2a2a34}
.gl.mo{background:#3a3a44;width:1.5px}
.tlnb{position:absolute;top:0;bottom:0;width:2px;background:#ff5555;opacity:.5;z-index:8;pointer-events:none}
.bar{position:absolute;height:18px;top:5px;border-radius:3px;display:flex;align-items:center;cursor:pointer;z-index:6;box-shadow:0 1px 3px rgba(0,0,0,.3);overflow:visible}
.bar:hover{opacity:.82}
.bar-hq-done{background:#4a4a6a}.bar-hq-going{background:#2176cc}.bar-hq-plan{background:#0f9e6e}
.bar-out-done{background:#5a4a2a}.bar-out-going{background:#cc8010}.bar-out-plan{background:#8a6e00}
.barlbl{position:sticky;left:302px;display:inline-flex;align-items:center;font-size:10px;font-weight:500;color:#fff;white-space:nowrap;height:100%;pointer-events:none;z-index:7;padding:0 7px;text-shadow:0 1px 2px rgba(0,0,0,.5)}
.evln{position:absolute;top:0;bottom:0;width:2px;z-index:7;pointer-events:none}
.evchip{position:absolute;top:3px;font-size:9px;font-weight:500;padding:1px 6px;border-radius:3px;white-space:nowrap;cursor:pointer;z-index:9;color:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.empty{padding:40px;text-align:center;color:#666;font-size:13px}
.mover{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.65);backdrop-filter:blur(3px)}
.modal{background:#181820;border-radius:10px;border:1.5px solid #555;padding:20px 22px;width:450px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 10px 40px rgba(0,0,0,.5)}
.modal.wide{width:560px}
.mtit{font-size:14px;font-weight:500;margin-bottom:16px;color:#e8e8ec}
.fg{margin-bottom:12px}
.fl{font-size:11px;color:#b0b0b8;margin-bottom:4px;display:block;font-weight:500}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
input,select{width:100%;padding:6px 9px;border:1px solid #3a3a44;border-radius:5px;font-size:12px;outline:none;background:#1e1e26;color:#e8e8ec}
input:focus,select:focus{border-color:#1a6bbf}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:12px;border-top:1px solid #3a3a44}
.dbox{padding:6px 10px;background:#1e1e26;border-radius:5px;font-size:12px;color:#b0b0b8;margin-bottom:12px;border:1px solid #3a3a44}
.crow{display:flex;gap:8px;flex-wrap:wrap;margin-top:4px}
.csw{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .12s}
.csw.sel{border-color:#e8e8ec;transform:scale(1.2)}
.mrow{display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid #2a2a34}
.dh{cursor:grab;color:#666;font-size:14px;padding:0 3px;user-select:none}
.dover{border-top:2px solid #1a6bbf!important}

      <button class="btn gsh" onclick="sheetsLoad()">🔄 Sheets 불러오기</button>
      <button class="btn gsh" onclick="sheetsSave()">☁ Sheets 저장</button>
      <button class="btn" onclick="openSheetsSettings()">⚙ Sheets 설정</button>
    </div>
  </div>
  <div class="content">
    <div class="sidebar">
      <div class="slbl">사이트 필터</div>
      <div class="slist" id="siteList"></div>
    </div>
    <div class="main">
      <div class="gscroll" id="gscroll">
        <div class="gwrap" id="gwrap">
          <div class="ghrow">
            <div class="ghinner">
              <div class="ghfixed">
                <div class="ghc" style="width:68px;min-width:68px;max-width:68px">업무</div>
                <div class="ghc">출장자</div>
              </div>
              <div class="ghtl" id="ghTl"></div>
            </div>
            <div class="ghdb">
              <div class="ghdbf"></div>
              <div class="ghdbt" id="ghDb"></div>
            </div>
          </div>
          <div id="gbody"></div>
        </div>
      </div>
    </div>
  </div>
</div>

var TODAY=(function(){var d=new Date();d.setHours(0,0,0,0);return d;})();
function pd(s){var d=new Date(s);d.setHours(0,0,0,0);return d;}
function dd(a,b){return Math.round((pd(b)-pd(a))/86400000)+1;}
function fmt(s){var d=pd(s);return String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');}
function fmtFull(s){if(!s)return '';var d=pd(s);return d.getFullYear()+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+String(d.getDate()).padStart(2,'0');}
function todayLbl(){return (TODAY.getMonth()+1)+'/'+TODAY.getDate();}
function barCls(sc){
  var s=pd(sc.start),e=pd(sc.end);
  var isHq=(sc.type==='hq'||sc.type==='tech'||sc.type==='vision'||sc.type==='host');
  if(TODAY>e) return isHq?'bar-hq-done':'bar-out-done';
  if(TODAY>=s)return isHq?'bar-hq-going':'bar-out-going';
  return           isHq?'bar-hq-plan':'bar-out-plan';
}

var WPX=42,_months=[],_totPx=0,_sd=null;
function calcRange(){
  var minD=new Date(TODAY.getFullYear(),TODAY.getMonth()-1,1),maxD=new Date(TODAY.getFullYear(),TODAY.getMonth()+3,0);
  var all=[];S.schedules.forEach(function(s){all.push(s.start);all.push(s.end);});S.events.forEach(function(e){all.push(e.date);});
  if(all.length){var sorted=all.map(function(d){return pd(d);}).sort(function(a,b){return a-b;});if(sorted[0]<minD)minD=new Date(sorted[0].getFullYear(),sorted[0].getMonth(),1);var mx=sorted[sorted.length-1];var mxE=new Date(mx.getFullYear(),mx.getMonth()+2,0);if(mxE>maxD)maxD=mxE;}
  return{start:minD,end:maxD};
}
function initTL(){
  var r=calcRange();_sd=new Date(r.start);_sd.setHours(0,0,0,0);_months=[];
  var cur=new Date(r.start.getFullYear(),r.start.getMonth(),1);
  while(cur<=r.end){var y=cur.getFullYear(),m=cur.getMonth()+1,days=new Date(y,m,0).getDate();_months.push({y:y,m:m,days:days,weeks:Math.ceil(days/7),label:(m===1?y+'년 ':'')+m+'월'});cur=new Date(y,m,1);}
  _totPx=Math.round(_months.reduce(function(s,m){return s+m.days;},0)/7*WPX);
}
function d2px(ds){return Math.round(Math.max(0,Math.round((pd(ds)-_sd)/86400000))/7*WPX);}
function tpx(){return d2px(TODAY.toISOString().slice(0,10));}
function mPx(mon){return Math.round(mon.days/7*WPX);}
function wPx(mon,wi){var s=wi*7+1,e=Math.min(s+6,mon.days);return Math.round((e-s+1)/7*WPX);}

function renderHeader(){
  var tl=document.getElementById('ghTl');tl.innerHTML='';
  _months.forEach(function(mon){var mpx=mPx(mon);var div=document.createElement('div');div.className='ghmb';div.style.width=mpx+'px';var wkh='';for(var i=0;i<mon.weeks;i++){var p=wPx(mon,i);wkh+='<div class="ghwk" style="width:'+p+'px;min-width:'+p+'px">'+(i+1)+'주</div>';}div.innerHTML='<div class="ghmn">'+mon.label+'</div><div class="ghwks">'+wkh+'</div>';tl.appendChild(div);});
  var db=document.getElementById('ghDb');db.innerHTML='';addGrid(db);
  var tp=tpx();if(tp>=0&&tp<=_totPx){var ln=document.createElement('div');ln.className='tdln';ln.style.left=tp+'px';db.appendChild(ln);var lb=document.createElement('div');lb.className='tdlb';lb.style.left=(tp+3)+'px';lb.textContent=todayLbl();db.appendChild(lb);}
  document.getElementById('gwrap').style.width=(300+_totPx)+'px';
}

function addTodayLine(el){var px=tpx();if(px<0||px>_totPx)return;var ln=document.createElement('div');ln.className='tlnb';ln.style.left=px+'px';el.appendChild(ln);}
function addEv(el,evts,chips){evts.forEach(function(evt){var col=EVC.find(function(c){return c.id===evt.colorId;})||EVC[0];var px=d2px(evt.date);var ln=document.createElement('div');ln.className='evln';ln.style.cssText='left:'+px+'px;background:'+col.bg+';opacity:'+(chips?'.9':'.25');el.appendChild(ln);if(chips){var ch=document.createElement('div');ch.className='evchip';ch.style.cssText='left:'+(px+3)+'px;background:'+col.bg;ch.textContent=fmt(evt.date)+' '+evt.title;ch.onclick=(function(id){return function(){openEditEv(id);};})(evt.id);el.appendChild(ch);}});}

function addBar(el,sched){
  var sp=d2px(sched.start),ep=d2px(sched.end)+Math.round(WPX/7),wp=Math.max(ep-sp,8);
  var days=dd(sched.start,sched.end),dr=fmt(sched.start)+'~'+fmt(sched.end);
  var tl=TYPE_LBL[sched.type]||sched.type;
  var txt=dr+' · '+sched.name+' ['+tl+'] ('+days+'일)'+(sched.note?' · '+sched.note:'');
  var bar=document.createElement('div');bar.className='bar '+barCls(sched);bar.style.cssText='left:'+sp+'px;width:'+wp+'px';bar.title=txt;
  bar.onclick=(function(id){return function(){openEditSc(id);};})(sched.id);

function renderGantt(){

  if(!projs.length){body.innerHTML='<div class="empty">등록된 출장 일정이 없습니다.</div>';return;}

    var tasks=[];scheds.forEach(function(s){if(tasks.indexOf(s.task)<0)tasks.push(s.task);});
    tasks.forEach(function(task){
      scheds.filter(function(s){return s.task===task;}).forEach(function(sched,idx){
        var days=dd(sched.start,sched.end),dr=fmt(sched.start)+'~'+fmt(sched.end);
        var isDone=TODAY>pd(sched.end);var isEven=(ri%2===0);ri++;

  document.getElementById('gscroll').scrollLeft=Math.max(0,tpx()-120);

function delSc(id){if(!confirm('이 출장 일정을 삭제할까요?'))return;S.schedules=S.schedules.filter(function(s){return s.id!==id;});saveData();cm();renderAll();}

function showSiteM(){
  var sr=S.sites.map(function(s,i){return '<div class="mrow" draggable="true" ondragstart="dStart('+i+')" ondragover="dOver(event,'+i+')" ondrop="dDrop('+i+')" ondragleave="dLeave(event)"><span class="dh">⠿</span><input type="color" value="'+s.color+'" onchange="updSC(\''+s.id+'\',this.value)" style="width:28px;height:22px;padding:0;border:none;background:none;cursor:pointer"><input type="text" value="'+s.name+'" onchange="updSN(\''+s.id+'\',this.value)" style="flex:1;min-width:80px"><span style="font-size:10px;color:#666;white-space:nowrap">'+S.projects.filter(function(p){return p.siteId===s.id;}).length+'개 PJT</span><button class="btn sm" onclick="addP(\''+s.id+'\')">PJT+</button><button class="btn sm red" onclick="delSite(\''+s.id+'\')">삭제</button></div>';}).join('');
  var pr=S.projects.map(function(p){var si=S.sites.find(function(s){return s.id===p.siteId;});return '<div class="mrow"><span style="font-size:10px;padding:1px 6px;border-radius:7px;color:#fff;background:'+(si?si.color:'#666')+';white-space:nowrap;flex-shrink:0">'+(si?si.name:p.siteId)+'</span><input type="text" value="'+p.name+'" onchange="updPN(\''+p.id+'\',this.value)" style="flex:1;min-width:100px"><button class="btn sm red" onclick="delPjt(\''+p.id+'\')">삭제</button></div>';}).join('');
  mw('<div class="mtit">사이트 / 프로젝트 관리</div><div style="margin-bottom:14px"><div style="font-size:11px;color:#666;margin-bottom:6px">사이트 목록 (⠿ 드래그로 순서변경)</div><div id="siteRows">'+sr+'</div><div style="display:flex;gap:6px;margin-top:8px;align-items:center"><input type="text" id="ns_n" placeholder="새 사이트 이름" style="flex:1"><input type="color" id="ns_c" value="#1558a0" style="width:34px;padding:1px"><button class="btn sm pri" onclick="addSite()">추가</button></div></div><div><div style="font-size:11px;color:#666;margin-bottom:6px">프로젝트 목록</div>'+pr+'</div><div class="mfoot"><button class="btn sm" onclick="cm()">닫기</button></div>',true);
}
function updSN(id,v){var s=S.sites.find(function(s){return s.id===id;});if(s){s.name=v.trim();saveData();renderSidebar();renderGantt();}}
function updSC(id,v){var s=S.sites.find(function(s){return s.id===id;});if(s){s.color=v;saveData();renderSidebar();renderGantt();}}
function updPN(id,v){var p=S.projects.find(function(p){return p.id===id;});if(p){p.name=v.trim();saveData();renderGantt();}}
function dStart(i){_dragIdx=i;}
function dOver(e,i){e.preventDefault();e.currentTarget.classList.add('dover');}
function dLeave(e){e.currentTarget.classList.remove('dover');}
function dDrop(i){if(_dragIdx===null||_dragIdx===i)return;var moved=S.sites.splice(_dragIdx,1)[0];S.sites.splice(i,0,moved);_dragIdx=null;saveData();showSiteM();renderAll();}
function addSite(){
  var name=document.getElementById('ns_n').value.trim(),color=document.getElementById('ns_c').value;
  if(!name){alert('사이트 이름을 입력하세요.');return;}
  var baseId=name.replace(/[^a-zA-Z0-9가-힣]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'')||'site';
  var newId=baseId,n=2;while(S.sites.find(function(s){return s.id===newId;}))newId=baseId+'_'+n++;
  S.sites.push({id:newId,name:name,color:color});saveData();showSiteM();renderAll();
}
function delSite(id){
  if(!confirm('사이트와 관련 항목을 모두 삭제합니까?'))return;
  var pids=S.projects.filter(function(p){return p.siteId===id;}).map(function(p){return p.id;});
  S.projects=S.projects.filter(function(p){return p.siteId!==id;});S.schedules=S.schedules.filter(function(s){return pids.indexOf(s.projectId)<0;});S.events=S.events.filter(function(e){return pids.indexOf(e.projectId)<0;});S.sites=S.sites.filter(function(s){return s.id!==id;});
  saveData();showSiteM();renderAll();
}
function addP(sid){
  var name=prompt('새 프로젝트 이름:');if(!name)return;
  var baseId=name.replace(/[^a-zA-Z0-9가-힣]/g,'_').replace(/_+/g,'_').replace(/^_|_$/g,'')||'pjt';
  var newId=baseId,n=2;while(S.projects.find(function(p){return p.id===newId;}))newId=baseId+'_'+n++;
  S.projects.push({id:newId,siteId:sid,name:name});saveData();showSiteM();renderAll();
}
function delPjt(id){
  if(!confirm('프로젝트와 관련 일정을 모두 삭제합니까?'))return;
  S.schedules=S.schedules.filter(function(s){return s.projectId!==id;});S.events=S.events.filter(function(e){return e.projectId!==id;});S.projects=S.projects.filter(function(p){return p.id!==id;});
  saveData();showSiteM();renderAll();
}

loadData();
renderAll();
</script>
</body>
</html>
